server:
  port: ${SERVER_PORT:8080}

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DB_URL}
    username: ${SPRING_DB_USERNAME}
    password: ${SPRING_DB_PASSWORD}
    driver-class-name: ${SPRING_DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
  data:
    redis:
      url: ${REDIS_URL}
  rabbitmq:
    uri: ${RABBITMQ_URL}
  jpa:
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: never

jwt:
  secret: ${JWT_SECRET}
  access-expiration: ${JWT_ACCESS_EXPIRATION:604800000}

ai:
  server:
    base-url: ${AI_SERVER_BASE_URL}
    connect-timeout-ms: ${AI_SERVER_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${AI_SERVER_READ_TIMEOUT_MS:10000}
    async-read-timeout-ms: ${AI_SERVER_ASYNC_READ_TIMEOUT_MS:15000}

app:
  cache:
    env: ${APP_ENV:prod}
    key-prefix: ${APP_CACHE_KEY_PREFIX:ai}
    key-version: ${APP_CACHE_KEY_VERSION:v1}
    l1:
      enabled: ${APP_CACHE_L1_ENABLED:true}
      spec: ${APP_CACHE_L1_SPEC:maximumSize=10000,expireAfterWrite=15m,recordStats}
    l2:
      default-ttl-seconds: ${APP_CACHE_L2_DEFAULT_TTL_SECONDS:300}
      min-ttl-seconds: ${APP_CACHE_L2_MIN_TTL_SECONDS:5}
      max-ttl-seconds: ${APP_CACHE_L2_MAX_TTL_SECONDS:86400}
      jitter-ratio: ${APP_CACHE_L2_JITTER_RATIO:0.2}
    codec:
      compression-enabled: ${APP_CACHE_CODEC_COMPRESSION_ENABLED:true}
      compression-threshold-bytes: ${APP_CACHE_CODEC_COMPRESSION_THRESHOLD_BYTES:1024}
      format: ${APP_CACHE_CODEC_FORMAT:msgpack}
  security:
    storage-api:
      enabled: ${STORAGE_API_AUTH_ENABLED:true}
      keys:
        - id: ${STORAGE_API_KEY_ID:storage-admin}
          value: ${STORAGE_API_KEY_VALUE:}
          global-access: ${STORAGE_API_GLOBAL_ACCESS:true}
          active: ${STORAGE_API_KEY_ACTIVE:true}
  rabbitmq:
    exchange: ${RABBITMQ_EXCHANGE:withbuddy.events}
    queue-nudge: ${RABBITMQ_QUEUE_NUDGE:q.nudge}
    queue-analytics: ${RABBITMQ_QUEUE_ANALYTICS:q.analytics}
    queue-internal-tasks: ${RABBITMQ_QUEUE_INTERNAL_TASKS:q.internal.tasks}
    queue-internal-tasks-dlq: ${RABBITMQ_QUEUE_INTERNAL_TASKS_DLQ:q.internal.tasks.dlq}
    internal-tasks-routing-key: ${RABBITMQ_INTERNAL_TASKS_ROUTING_KEY:internal.tasks.requested}
    internal-tasks-dlq-routing-key: ${RABBITMQ_INTERNAL_TASKS_DLQ_ROUTING_KEY:dlq.internal.tasks}
    internal-tasks-dlq-routing-key-legacy: ${RABBITMQ_INTERNAL_TASKS_DLQ_ROUTING_KEY_LEGACY:internal.tasks.dlq}
    nudge-ttl-ms: ${RABBITMQ_NUDGE_TTL_MS:86400000}
    analytics-ttl-ms: ${RABBITMQ_ANALYTICS_TTL_MS:30000}
    listener-prefetch: ${RABBITMQ_LISTENER_PREFETCH:10}
    listener-max-attempts: ${RABBITMQ_LISTENER_MAX_ATTEMPTS:3}
  internal-task-consumer:
    enabled: ${INTERNAL_TASK_CONSUMER_ENABLED:true}
    dry-run: ${INTERNAL_TASK_CONSUMER_DRY_RUN:false}
    concurrency: ${INTERNAL_TASK_CONSUMER_CONCURRENCY:1}
  storage:
    provider: ${STORAGE_PROVIDER:local}
    local-base-dir: ${STORAGE_LOCAL_BASE_DIR:storage-data}
    max-document-size-mb: ${STORAGE_MAX_DOCUMENT_SIZE_MB:20}
    max-image-size-mb: ${STORAGE_MAX_IMAGE_SIZE_MB:5}
    download-url-ttl-seconds: ${STORAGE_DOWNLOAD_URL_TTL_SECONDS:300}
    download-url-max-uses: ${STORAGE_DOWNLOAD_URL_MAX_USES:1}
    retry:
      enabled: ${STORAGE_RETRY_ENABLED:true}
      max-attempts: ${STORAGE_RETRY_MAX_ATTEMPTS:5}
      interval-ms: ${STORAGE_RETRY_INTERVAL_MS:60000}
      base-backoff-seconds: ${STORAGE_RETRY_BASE_BACKOFF_SECONDS:60}
      max-backoff-seconds: ${STORAGE_RETRY_MAX_BACKOFF_SECONDS:1800}
      batch-size: ${STORAGE_RETRY_BATCH_SIZE:20}
    oci-cli:
      executable: ${STORAGE_OCI_CLI_EXECUTABLE:oci}
      primary-profile: ${STORAGE_OCI_PRIMARY_PROFILE:DEFAULT}
      backup-profile: ${STORAGE_OCI_BACKUP_PROFILE:DEFAULT}
      region: ${STORAGE_OCI_REGION:}
      public-endpoint: ${STORAGE_OCI_PUBLIC_ENDPOINT:}
      preauth-ttl-seconds: ${STORAGE_OCI_PREAUTH_TTL_SECONDS:30}
      suppress-file-permissions-warning: ${STORAGE_OCI_SUPPRESS_PERMISSIONS_WARNING:true}
    primary:
      namespace: ${STORAGE_PRIMARY_NAMESPACE:primary}
      bucket: ${STORAGE_PRIMARY_BUCKET:withbuddy-primary}
    backup:
      namespace: ${STORAGE_BACKUP_NAMESPACE:backup}
      bucket: ${STORAGE_BACKUP_BUCKET:withbuddy-backup}

management:
  endpoint:
    health:
      probes:
        enabled: true
