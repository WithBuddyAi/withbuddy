server:
  port: 8080
  forward-headers-strategy: framework
  servlet:
    encoding:
      enabled: true
      charset: UTF-8
      force: true
      force-request: true
      force-response: true

spring:
  application:
    name: withbuddy
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: ${SPRING_DB_URL}
    username: ${SPRING_DB_USERNAME}
    password: ${SPRING_DB_PASSWORD}
  data:
    redis:
      url: ${REDIS_URL}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms
        shutdown-timeout: 100ms
      connect-timeout: 2000ms
      timeout: 1000ms
  rabbitmq:
    uri: ${RABBITMQ_URL}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
    encoding: UTF-8
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:0}


springdoc:
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 604800000

ai:
  server:
    base-url: ${AI_SERVER_BASE_URL}
    summary:
      connect-timeout-ms: ${AI_SERVER_SUMMARY_CONNECT_TIMEOUT_MS:3000}
      read-timeout-ms: ${AI_SERVER_SUMMARY_READ_TIMEOUT_MS:10000}
      prompt-style: ${AI_SERVER_SUMMARY_PROMPT_STYLE:A}

app:
  cache:
    env: ${APP_ENV:prod}
    key-prefix: ${APP_CACHE_KEY_PREFIX:ai}
    key-version: ${APP_CACHE_KEY_VERSION:v1}
    l1:
      enabled: ${APP_CACHE_L1_ENABLED:true}
      spec: ${APP_CACHE_L1_SPEC:maximumSize=5000,expireAfterWrite=10m,recordStats}
      negative-ttl-seconds: ${APP_CACHE_L1_NEGATIVE_TTL_SECONDS:30}
      swr-enabled: ${APP_CACHE_L1_SWR_ENABLED:true}
      swr-refresh-after-seconds: ${APP_CACHE_L1_SWR_REFRESH_AFTER_SECONDS:15}
    l2:
      default-ttl-seconds: ${APP_CACHE_L2_DEFAULT_TTL_SECONDS:300}
      min-ttl-seconds: ${APP_CACHE_L2_MIN_TTL_SECONDS:5}
      max-ttl-seconds: ${APP_CACHE_L2_MAX_TTL_SECONDS:86400}
      jitter-ratio: ${APP_CACHE_L2_JITTER_RATIO:0.2}
    codec:
      compression-enabled: ${APP_CACHE_CODEC_COMPRESSION_ENABLED:true}
      compression-threshold-bytes: ${APP_CACHE_CODEC_COMPRESSION_THRESHOLD_BYTES:1024}
      format: ${APP_CACHE_CODEC_FORMAT:msgpack}
    invalidation:
      enabled: ${APP_CACHE_INVALIDATION_ENABLED:true}
      channel: ${APP_CACHE_INVALIDATION_CHANNEL:withbuddy:cache:invalidate}
      node-id: ${APP_CACHE_INVALIDATION_NODE_ID:}
    resilience:
      enabled: ${APP_CACHE_RESILIENCE_ENABLED:true}
      circuit-failure-threshold: ${APP_CACHE_RESILIENCE_CIRCUIT_FAILURE_THRESHOLD:5}
      circuit-open-seconds: ${APP_CACHE_RESILIENCE_CIRCUIT_OPEN_SECONDS:30}
      fallback-rate-per-second: ${APP_CACHE_RESILIENCE_FALLBACK_RATE_PER_SECOND:20}
      fallback-burst: ${APP_CACHE_RESILIENCE_FALLBACK_BURST:40}
  security:
    cors:
      allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,https://*.vercel.app,https://withbuddy.itsdev.kr}
      allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
      allowed-headers: ${CORS_ALLOWED_HEADERS:*}
      exposed-headers: ${CORS_EXPOSED_HEADERS:}
      allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
      max-age-seconds: ${CORS_MAX_AGE_SECONDS:3600}
    turnstile:
      enabled: ${TURNSTILE_ENABLED:false}
      secret-key: ${TURNSTILE_SECRET_KEY:}
      siteverify-url: ${TURNSTILE_SITEVERIFY_URL:https://challenges.cloudflare.com/turnstile/v0/siteverify}
      connect-timeout-ms: ${TURNSTILE_CONNECT_TIMEOUT_MS:5000}
      read-timeout-ms: ${TURNSTILE_READ_TIMEOUT_MS:10000}
    login-rate-limit:
      enabled: ${LOGIN_RATE_LIMIT_ENABLED:true}
      account-max-failures: ${LOGIN_RATE_LIMIT_ACCOUNT_MAX_FAILURES:5}
      ip-max-failures: ${LOGIN_RATE_LIMIT_IP_MAX_FAILURES:20}
      window-seconds: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:600}
      lock-seconds: ${LOGIN_RATE_LIMIT_LOCK_SECONDS:900}
    storage-api:
      enabled: ${STORAGE_API_AUTH_ENABLED:false}
      keys:
        - id: ${STORAGE_API_KEY_ID:storage-admin}
          value: ${STORAGE_API_KEY_VALUE:}
          global-access: ${STORAGE_API_GLOBAL_ACCESS:true}
          active: ${STORAGE_API_KEY_ACTIVE:true}
    internal-api:
      enabled: ${INTERNAL_API_AUTH_ENABLED:true}
      header-name: ${INTERNAL_API_HEADER_NAME:X-API-Key}
      token: ${INTERNAL_API_TOKEN:${INTERNAL_API_KEY:${STORAGE_API_KEY_VALUE:}}}
  rabbitmq:
    exchange: ${RABBITMQ_EXCHANGE:withbuddy.events}
    queue-nudge: ${RABBITMQ_QUEUE_NUDGE:q.nudge}
    queue-analytics: ${RABBITMQ_QUEUE_ANALYTICS:q.analytics}
    queue-internal-tasks: ${RABBITMQ_QUEUE_INTERNAL_TASKS:q.internal.tasks}
    queue-internal-tasks-dlq: ${RABBITMQ_QUEUE_INTERNAL_TASKS_DLQ:q.internal.tasks.dlq}
    nudge-ttl-ms: ${RABBITMQ_NUDGE_TTL_MS:86400000}
    analytics-ttl-ms: ${RABBITMQ_ANALYTICS_TTL_MS:30000}
    listener-prefetch: ${RABBITMQ_LISTENER_PREFETCH:10}
    listener-max-attempts: ${RABBITMQ_LISTENER_MAX_ATTEMPTS:3}
  internal-task-consumer:
    enabled: ${INTERNAL_TASK_CONSUMER_ENABLED:false}
    dry-run: ${INTERNAL_TASK_CONSUMER_DRY_RUN:false}
    concurrency: ${INTERNAL_TASK_CONSUMER_CONCURRENCY:1}
  storage:
    provider: ${STORAGE_PROVIDER:local}
    local-base-dir: ${STORAGE_LOCAL_BASE_DIR:storage-data}
    max-document-size-mb: ${STORAGE_MAX_DOCUMENT_SIZE_MB:20}
    download-url-ttl-seconds: ${STORAGE_DOWNLOAD_URL_TTL_SECONDS:300}
    download-url-max-uses: ${STORAGE_DOWNLOAD_URL_MAX_USES:1}
    retry:
      enabled: ${STORAGE_RETRY_ENABLED:true}
      max-attempts: ${STORAGE_RETRY_MAX_ATTEMPTS:5}
      interval-ms: ${STORAGE_RETRY_INTERVAL_MS:60000}
      base-backoff-seconds: ${STORAGE_RETRY_BASE_BACKOFF_SECONDS:60}
      max-backoff-seconds: ${STORAGE_RETRY_MAX_BACKOFF_SECONDS:1800}
      batch-size: ${STORAGE_RETRY_BATCH_SIZE:20}
    oci-cli:
      executable: ${STORAGE_OCI_CLI_EXECUTABLE:oci}
      primary-profile: ${STORAGE_OCI_PRIMARY_PROFILE:DEFAULT}
      backup-profile: ${STORAGE_OCI_BACKUP_PROFILE:DEFAULT}
      region: ${STORAGE_OCI_REGION:}
      public-endpoint: ${STORAGE_OCI_PUBLIC_ENDPOINT:}
      preauth-ttl-seconds: ${STORAGE_OCI_PREAUTH_TTL_SECONDS:30}
      suppress-file-permissions-warning: ${STORAGE_OCI_SUPPRESS_PERMISSIONS_WARNING:true}
    primary:
      namespace: ${STORAGE_PRIMARY_NAMESPACE:primary}
      bucket: ${STORAGE_PRIMARY_BUCKET:withbuddy-primary}
    backup:
      namespace: ${STORAGE_BACKUP_NAMESPACE:backup}
      bucket: ${STORAGE_BACKUP_BUCKET:withbuddy-backup}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
