name: Deploy Backend
# Flyway repair step runs on DB server via DB_SERVER_* environment secrets.

on:
  workflow_dispatch:
    inputs:
      target_slot:
        description: "Deploy target slot (must be the non-live slot)"
        required: true
        type: choice
        options:
          - blue
          - green
      live_slot:
        description: "Current live slot receiving production traffic"
        required: true
        type: choice
        options:
          - blue
          - green
      switch_traffic:
        description: "Switch production traffic to target_slot after deploy"
        required: false
        default: true
        type: boolean

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 25
    concurrency:
      group: backend-deploy-${{ github.ref }}-${{ github.event.inputs.target_slot }}
      cancel-in-progress: true

    steps:
      - name: Branch guard
        id: branch_guard
        shell: bash
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ] && [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Production deploy enabled for ${GITHUB_REF}"
            echo "target_slot=${{ github.event.inputs.target_slot }}" >> "$GITHUB_OUTPUT"
            echo "live_slot=${{ github.event.inputs.live_slot }}" >> "$GITHUB_OUTPUT"
            echo "switch_traffic=${{ github.event.inputs.switch_traffic }}" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Deploy Backend is production-only."
            echo "Use main branch for production deployment."
            echo "Current ref: ${GITHUB_REF}"
          fi

      - name: Print deployment target
        if: steps.branch_guard.outputs.should_deploy == 'true'
        shell: bash
        run: |
          set -euo pipefail
          case "${{ steps.branch_guard.outputs.target_slot }}" in
            blue|green)
              echo "Deploying backend to slot=${{ steps.branch_guard.outputs.target_slot }}"
              echo "Current live slot=${{ steps.branch_guard.outputs.live_slot }}"
              echo "Traffic switch requested=${{ steps.branch_guard.outputs.switch_traffic }}"
              echo "GitHub environment=production"
              ;;
            *)
              echo "Invalid target_slot: ${{ steps.branch_guard.outputs.target_slot }}"
              exit 1
              ;;
          esac

          case "${{ steps.branch_guard.outputs.live_slot }}" in
            blue|green)
              ;;
            *)
              echo "Invalid live_slot: ${{ steps.branch_guard.outputs.live_slot }}"
              exit 1
              ;;
          esac

          if [ "${{ steps.branch_guard.outputs.target_slot }}" = "${{ steps.branch_guard.outputs.live_slot }}" ]; then
            echo "target_slot and live_slot must be different for blue/green deployment."
            exit 1
          fi

      - name: Resolve slot-specific deploy settings
        if: steps.branch_guard.outputs.should_deploy == 'true'
        id: slot_config
        env:
          BLUE_BACKEND_ACCESS_HOST: ${{ secrets.BLUE_BACKEND_ACCESS_HOST }}
          GREEN_BACKEND_ACCESS_HOST: ${{ secrets.GREEN_BACKEND_ACCESS_HOST }}
          BLUE_BACKEND_SERVER_HOST: ${{ secrets.BLUE_BACKEND_SERVER_HOST }}
          GREEN_BACKEND_SERVER_HOST: ${{ secrets.GREEN_BACKEND_SERVER_HOST }}
          BLUE_BACKEND_SERVER_SSH_KEY: ${{ secrets.BLUE_BACKEND_SERVER_SSH_KEY }}
          GREEN_BACKEND_SERVER_SSH_KEY: ${{ secrets.GREEN_BACKEND_SERVER_SSH_KEY }}
          BLUE_BACKEND_HEALTH_URL: ${{ secrets.BLUE_BACKEND_HEALTH_URL }}
          GREEN_BACKEND_HEALTH_URL: ${{ secrets.GREEN_BACKEND_HEALTH_URL }}
        shell: bash
        run: |
          set -euo pipefail

          SLOT="${{ steps.branch_guard.outputs.target_slot }}"
          case "${SLOT}" in
            blue)
              ACCESS_HOST="${BLUE_BACKEND_ACCESS_HOST:-}"
              SERVER_HOST="${BLUE_BACKEND_SERVER_HOST:-}"
              SSH_KEY="${BLUE_BACKEND_SERVER_SSH_KEY:-}"
              HEALTH_URL="${BLUE_BACKEND_HEALTH_URL:-}"
              ;;
            green)
              ACCESS_HOST="${GREEN_BACKEND_ACCESS_HOST:-}"
              SERVER_HOST="${GREEN_BACKEND_SERVER_HOST:-}"
              SSH_KEY="${GREEN_BACKEND_SERVER_SSH_KEY:-}"
              HEALTH_URL="${GREEN_BACKEND_HEALTH_URL:-}"
              ;;
            *)
              echo "Unsupported target slot: ${SLOT}"
              exit 1
              ;;
          esac

          if [ -z "${SERVER_HOST}" ]; then
            echo "Slot ${SLOT} is missing *_BACKEND_SERVER_HOST"
            exit 1
          fi
          if [ -z "${SSH_KEY}" ]; then
            echo "Slot ${SLOT} is missing *_BACKEND_SERVER_SSH_KEY"
            exit 1
          fi
          if [ -z "${HEALTH_URL}" ]; then
            echo "Slot ${SLOT} is missing *_BACKEND_HEALTH_URL"
            exit 1
          fi

          echo "backend_access_host=${ACCESS_HOST}" >> "$GITHUB_OUTPUT"
          echo "backend_server_host=${SERVER_HOST}" >> "$GITHUB_OUTPUT"
          echo "backend_health_url=${HEALTH_URL}" >> "$GITHUB_OUTPUT"
          {
            echo "backend_server_ssh_key<<__SSHKEY__"
            printf '%s\n' "${SSH_KEY}"
            echo "__SSHKEY__"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.branch_guard.outputs.should_deploy == 'true'
        uses: actions/checkout@v4

      - name: Setup Java 21
        if: steps.branch_guard.outputs.should_deploy == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build Boot Jar
        if: steps.branch_guard.outputs.should_deploy == 'true'
        working-directory: ./backend
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew clean bootJar -x test --no-daemon

      - name: Prepare artifact
        if: steps.branch_guard.outputs.should_deploy == 'true'
        run: |
          set -euo pipefail
          JAR_PATH=$(ls backend/build/libs/*.jar | grep -v '\-plain\.jar$' | head -n 1 || true)
          if [ -z "${JAR_PATH}" ]; then
            echo "No boot jar found in backend/build/libs"
            exit 1
          fi
          cp "${JAR_PATH}" app.jar

      - name: Calculate Flyway checksum for V19 migration
        if: steps.branch_guard.outputs.should_deploy == 'true'
        id: v19_checksum
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/FlywayChecksumV19.java <<'JAVA'
          import java.nio.charset.StandardCharsets;
          import java.nio.file.Files;
          import java.nio.file.Path;
          import java.util.List;
          import java.util.zip.CRC32;

          public class FlywayChecksumV19 {
              public static void main(String[] args) throws Exception {
                  Path path = Path.of("backend/src/main/resources/db/migration/V19__dedupe_and_add_unique_for_suggestion_messages.sql");
                  List<String> lines = Files.readAllLines(path, StandardCharsets.UTF_8);
                  if (!lines.isEmpty() && !lines.get(0).isEmpty() && lines.get(0).charAt(0) == '\uFEFF') {
                      lines.set(0, lines.get(0).substring(1));
                  }
                  CRC32 crc = new CRC32();
                  for (String line : lines) {
                      crc.update(line.getBytes(StandardCharsets.UTF_8));
                  }
                  System.out.println((int) crc.getValue());
              }
          }
          JAVA
          CHECKSUM="$(java /tmp/FlywayChecksumV19.java)"
          echo "value=${CHECKSUM}" >> "$GITHUB_OUTPUT"
          echo "Computed Flyway-style checksum for V19 migration: ${CHECKSUM}"
      - name: Validate required environment secrets
        if: steps.branch_guard.outputs.should_deploy == 'true'
        env:
          BACKEND_ACCESS_HOST: ${{ steps.slot_config.outputs.backend_access_host }}
          BACKEND_SERVER_HOST: ${{ steps.slot_config.outputs.backend_server_host }}
          BACKEND_SERVER_USER: ${{ secrets.BACKEND_SERVER_USER }}
          BACKEND_SERVER_SSH_KEY: ${{ steps.slot_config.outputs.backend_server_ssh_key }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          BACKEND_APP_DIR: ${{ secrets.BACKEND_APP_DIR }}
          SPRING_DB_URL: ${{ secrets.SPRING_DB_URL }}
          SPRING_DB_USERNAME: ${{ secrets.SPRING_DB_USERNAME }}
          SPRING_DB_PASSWORD: ${{ secrets.SPRING_DB_PASSWORD }}
          SPRING_DB_DRIVER_CLASS_NAME: ${{ secrets.SPRING_DB_DRIVER_CLASS_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ACCESS_EXPIRATION: ${{ secrets.JWT_ACCESS_EXPIRATION }}
          AI_SERVER_BASE_URL: ${{ secrets.AI_SERVER_BASE_URL }}
          AI_SERVER_CONNECT_TIMEOUT_MS: ${{ secrets.AI_SERVER_CONNECT_TIMEOUT_MS }}
          AI_SERVER_READ_TIMEOUT_MS: ${{ secrets.AI_SERVER_READ_TIMEOUT_MS }}
          AI_SERVER_ASYNC_READ_TIMEOUT_MS: ${{ secrets.AI_SERVER_ASYNC_READ_TIMEOUT_MS }}
          TURNSTILE_ENABLED: ${{ secrets.TURNSTILE_ENABLED }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          TURNSTILE_SITEVERIFY_URL: ${{ secrets.TURNSTILE_SITEVERIFY_URL }}
          TURNSTILE_CONNECT_TIMEOUT_MS: ${{ secrets.TURNSTILE_CONNECT_TIMEOUT_MS }}
          TURNSTILE_READ_TIMEOUT_MS: ${{ secrets.TURNSTILE_READ_TIMEOUT_MS }}
          LOGIN_RATE_LIMIT_ENABLED: ${{ secrets.LOGIN_RATE_LIMIT_ENABLED }}
          LOGIN_RATE_LIMIT_ACCOUNT_MAX_FAILURES: ${{ secrets.LOGIN_RATE_LIMIT_ACCOUNT_MAX_FAILURES }}
          LOGIN_RATE_LIMIT_IP_MAX_FAILURES: ${{ secrets.LOGIN_RATE_LIMIT_IP_MAX_FAILURES }}
          LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${{ secrets.LOGIN_RATE_LIMIT_WINDOW_SECONDS }}
          LOGIN_RATE_LIMIT_LOCK_SECONDS: ${{ secrets.LOGIN_RATE_LIMIT_LOCK_SECONDS }}
          BACKEND_HEALTH_URL: ${{ steps.slot_config.outputs.backend_health_url }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}
          RABBITMQ_HOST: ${{ secrets.RABBITMQ_HOST }}
          RABBITMQ_PORT: ${{ secrets.RABBITMQ_PORT }}
          RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          RABBITMQ_VHOST: ${{ secrets.RABBITMQ_VHOST }}
          RABBITMQ_EXCHANGE: ${{ secrets.RABBITMQ_EXCHANGE }}
          RABBITMQ_QUEUE_REPORT: ${{ secrets.RABBITMQ_QUEUE_REPORT }}
          RABBITMQ_QUEUE_DLQ: ${{ secrets.RABBITMQ_QUEUE_DLQ }}
          RABBITMQ_QUEUE_INTERNAL_TASKS: ${{ secrets.RABBITMQ_QUEUE_INTERNAL_TASKS }}
          RABBITMQ_INTERNAL_TASKS_DLQ_ROUTING_KEY: ${{ secrets.RABBITMQ_INTERNAL_TASKS_DLQ_ROUTING_KEY }}
          INTERNAL_TASK_CONSUMER_ENABLED: ${{ secrets.INTERNAL_TASK_CONSUMER_ENABLED }}
          INTERNAL_TASK_CONSUMER_DRY_RUN: ${{ secrets.INTERNAL_TASK_CONSUMER_DRY_RUN }}
          INTERNAL_TASK_CONSUMER_CONCURRENCY: ${{ secrets.INTERNAL_TASK_CONSUMER_CONCURRENCY }}
          STORAGE_API_AUTH_ENABLED: ${{ secrets.STORAGE_API_AUTH_ENABLED }}
          STORAGE_API_KEY_VALUE: ${{ secrets.STORAGE_API_KEY_VALUE }}
          STORAGE_API_GLOBAL_ACCESS: ${{ secrets.STORAGE_API_GLOBAL_ACCESS }}
          STORAGE_API_KEY_ACTIVE: ${{ secrets.STORAGE_API_KEY_ACTIVE }}
          STORAGE_PROVIDER: ${{ secrets.STORAGE_PROVIDER }}
          STORAGE_LOCAL_BASE_DIR: ${{ secrets.STORAGE_LOCAL_BASE_DIR }}
          STORAGE_MAX_DOCUMENT_SIZE_MB: ${{ secrets.STORAGE_MAX_DOCUMENT_SIZE_MB }}
          STORAGE_MAX_IMAGE_SIZE_MB: ${{ secrets.STORAGE_MAX_IMAGE_SIZE_MB }}
          STORAGE_DOWNLOAD_URL_TTL_SECONDS: ${{ secrets.STORAGE_DOWNLOAD_URL_TTL_SECONDS }}
          STORAGE_RETRY_ENABLED: ${{ secrets.STORAGE_RETRY_ENABLED }}
          STORAGE_RETRY_MAX_ATTEMPTS: ${{ secrets.STORAGE_RETRY_MAX_ATTEMPTS }}
          STORAGE_RETRY_INTERVAL_MS: ${{ secrets.STORAGE_RETRY_INTERVAL_MS }}
          STORAGE_RETRY_BASE_BACKOFF_SECONDS: ${{ secrets.STORAGE_RETRY_BASE_BACKOFF_SECONDS }}
          STORAGE_RETRY_MAX_BACKOFF_SECONDS: ${{ secrets.STORAGE_RETRY_MAX_BACKOFF_SECONDS }}
          STORAGE_RETRY_BATCH_SIZE: ${{ secrets.STORAGE_RETRY_BATCH_SIZE }}
          STORAGE_OCI_CLI_EXECUTABLE: ${{ secrets.STORAGE_OCI_CLI_EXECUTABLE }}
          STORAGE_OCI_PRIMARY_PROFILE: ${{ secrets.STORAGE_OCI_PRIMARY_PROFILE }}
          STORAGE_OCI_BACKUP_PROFILE: ${{ secrets.STORAGE_OCI_BACKUP_PROFILE }}
          STORAGE_OCI_REGION: ${{ secrets.STORAGE_OCI_REGION }}
          STORAGE_OCI_PUBLIC_ENDPOINT: ${{ secrets.STORAGE_OCI_PUBLIC_ENDPOINT }}
          STORAGE_OCI_PREAUTH_TTL_SECONDS: ${{ secrets.STORAGE_OCI_PREAUTH_TTL_SECONDS }}
          STORAGE_OCI_SUPPRESS_PERMISSIONS_WARNING: ${{ secrets.STORAGE_OCI_SUPPRESS_PERMISSIONS_WARNING }}
          STORAGE_PRIMARY_NAMESPACE: ${{ secrets.STORAGE_PRIMARY_NAMESPACE }}
          STORAGE_PRIMARY_BUCKET: ${{ secrets.STORAGE_PRIMARY_BUCKET }}
          STORAGE_BACKUP_NAMESPACE: ${{ secrets.STORAGE_BACKUP_NAMESPACE }}
          STORAGE_BACKUP_BUCKET: ${{ secrets.STORAGE_BACKUP_BUCKET }}
          CORS_ALLOWED_ORIGIN_PATTERNS: ${{ secrets.CORS_ALLOWED_ORIGIN_PATTERNS }}
        run: |
          set -euo pipefail
          required_vars=(
            BACKEND_SERVER_HOST
            BACKEND_SERVER_USER
            BACKEND_SERVER_SSH_KEY
            BACKEND_APP_DIR
            SPRING_DB_URL
            SPRING_DB_USERNAME
            SPRING_DB_PASSWORD
            SPRING_DB_DRIVER_CLASS_NAME
            JWT_SECRET
            JWT_ACCESS_EXPIRATION
            AI_SERVER_BASE_URL
            AI_SERVER_CONNECT_TIMEOUT_MS
            AI_SERVER_READ_TIMEOUT_MS
            AI_SERVER_ASYNC_READ_TIMEOUT_MS
            BACKEND_HEALTH_URL
            REDIS_URL
            RABBITMQ_URL
            RABBITMQ_EXCHANGE
            RABBITMQ_QUEUE_REPORT
            RABBITMQ_QUEUE_DLQ
            STORAGE_API_AUTH_ENABLED
            STORAGE_API_KEY_VALUE
            STORAGE_API_GLOBAL_ACCESS
            STORAGE_API_KEY_ACTIVE
            STORAGE_PROVIDER
            STORAGE_LOCAL_BASE_DIR
            STORAGE_MAX_DOCUMENT_SIZE_MB
            STORAGE_MAX_IMAGE_SIZE_MB
            STORAGE_DOWNLOAD_URL_TTL_SECONDS
            STORAGE_RETRY_ENABLED
            STORAGE_RETRY_MAX_ATTEMPTS
            STORAGE_RETRY_INTERVAL_MS
            STORAGE_RETRY_BASE_BACKOFF_SECONDS
            STORAGE_RETRY_MAX_BACKOFF_SECONDS
            STORAGE_RETRY_BATCH_SIZE
            STORAGE_OCI_CLI_EXECUTABLE
            STORAGE_OCI_PRIMARY_PROFILE
            STORAGE_OCI_BACKUP_PROFILE
            STORAGE_OCI_SUPPRESS_PERMISSIONS_WARNING
            STORAGE_PRIMARY_NAMESPACE
            STORAGE_PRIMARY_BUCKET
            STORAGE_BACKUP_NAMESPACE
            STORAGE_BACKUP_BUCKET
          )
          missing_vars=()
          for v in "${required_vars[@]}"; do
            if [ -z "${!v:-}" ]; then
              missing_vars+=("$v")
            fi
          done
          if [ "${#missing_vars[@]}" -gt 0 ]; then
            echo "Missing required secrets: ${missing_vars[*]}"
            exit 1
          fi

          if [ -n "${BACKEND_ACCESS_HOST:-}" ]; then
            if [ -z "${CF_ACCESS_CLIENT_ID:-}" ] || [ -z "${CF_ACCESS_CLIENT_SECRET:-}" ]; then
              echo "BACKEND_ACCESS_HOST is set, so CF_ACCESS_CLIENT_ID and CF_ACCESS_CLIENT_SECRET are also required."
              exit 1
            fi
            echo "SSH mode: Cloudflare Access (${BACKEND_ACCESS_HOST})"
          else
            echo "SSH mode: direct SSH fallback (${BACKEND_SERVER_HOST})"
          fi

          if [ "${TURNSTILE_ENABLED:-false}" = "true" ] && [ -z "${TURNSTILE_SECRET_KEY:-}" ]; then
            echo "TURNSTILE_ENABLED=true 인데 TURNSTILE_SECRET_KEY가 비어 있습니다."
            exit 1
          fi

          # RabbitMQ 자격증명 누락/형식 불량 사전 차단
          if [ -z "${RABBITMQ_PASSWORD:-}" ]; then
            if ! printf '%s' "${RABBITMQ_URL}" | grep -Eq '^amqps?://[^:@/]+:[^@/]+@[^/:?#]+(:[0-9]+)?/.+'; then
              echo "Invalid RABBITMQ_URL format. Expected amqp://user:password@host:port/vhost when RABBITMQ_PASSWORD is not set."
              exit 1
            fi
          fi
          if printf '%s' "${RABBITMQ_URL}" | grep -Eq '^amqps?://[^@]+@(localhost|127\.0\.0\.1)(:[0-9]+)?/'; then
            echo "RABBITMQ_URL points to localhost/127.0.0.1, which is not allowed for production deploy."
            exit 1
          fi

          # OCI pre-signed URL 생성 조건 검증
          # STORAGE_* 값이 없더라도 런타임에서 host-level OCI_REGION을 사용할 수 있으므로 배포 자체는 차단하지 않는다.
          if [ "${STORAGE_PROVIDER}" = "oci-cli" ] && \
             [ -z "${STORAGE_OCI_REGION:-}" ] && \
             [ -z "${STORAGE_OCI_PUBLIC_ENDPOINT:-}" ]; then
            echo "WARN: STORAGE_OCI_REGION/STORAGE_OCI_PUBLIC_ENDPOINT not set. Runtime will rely on OCI_REGION from backend host environment."
          fi

      - name: Install cloudflared client on runner
        if: steps.branch_guard.outputs.should_deploy == 'true'
        env:
          BACKEND_ACCESS_HOST: ${{ steps.slot_config.outputs.backend_access_host }}
        run: |
          set -euo pipefail
          if [ -z "${BACKEND_ACCESS_HOST:-}" ]; then
            echo "BACKEND_ACCESS_HOST not set. Skipping cloudflared installation."
            exit 0
          fi
          sudo curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Configure SSH connection
        if: steps.branch_guard.outputs.should_deploy == 'true'
        id: ssh_config
        env:
          BACKEND_ACCESS_HOST: ${{ steps.slot_config.outputs.backend_access_host }}
          BACKEND_SERVER_HOST: ${{ steps.slot_config.outputs.backend_server_host }}
          BACKEND_SERVER_USER: ${{ secrets.BACKEND_SERVER_USER }}
          BACKEND_SERVER_SSH_KEY: ${{ steps.slot_config.outputs.backend_server_ssh_key }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          cat > ~/.ssh/backend_key <<'KEY_EOF'
          ${{ steps.slot_config.outputs.backend_server_ssh_key }}
          KEY_EOF
          chmod 600 ~/.ssh/backend_key

          if [ -n "${BACKEND_ACCESS_HOST:-}" ]; then
            cat > ~/.ssh/config <<EOF
          Host backend-target
            HostName ${BACKEND_ACCESS_HOST}
            User ${BACKEND_SERVER_USER}
            Port 22
            IdentityFile ~/.ssh/backend_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ServerAliveInterval 30
            ProxyCommand cloudflared access ssh --hostname %h --id ${CF_ACCESS_CLIENT_ID} --secret ${CF_ACCESS_CLIENT_SECRET}
          EOF
            echo "target_host=backend-target" >> "$GITHUB_OUTPUT"
            echo "Configured Cloudflare Access SSH for ${BACKEND_ACCESS_HOST}"
          else
            cat > ~/.ssh/config <<EOF
          Host backend-target
            HostName ${BACKEND_SERVER_HOST}
            User ${BACKEND_SERVER_USER}
            Port 22
            IdentityFile ~/.ssh/backend_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ServerAliveInterval 30
          EOF
            echo "target_host=backend-target" >> "$GITHUB_OUTPUT"
            echo "Configured direct SSH for ${BACKEND_SERVER_HOST}"
          fi

          chmod 600 ~/.ssh/config
          ssh -o BatchMode=yes -o ConnectTimeout=10 backend-target "echo ssh_ok"

      - name: Upload artifacts to server (Cloudflare SSH)
        if: steps.branch_guard.outputs.should_deploy == 'true'
        env:
          BACKEND_APP_DIR: ${{ secrets.BACKEND_APP_DIR }}
          TARGET_SSH_HOST: ${{ steps.ssh_config.outputs.target_host }}
        run: |
          set -euo pipefail
          ssh "${TARGET_SSH_HOST}" "mkdir -p '${BACKEND_APP_DIR}/logs'"
          ssh "${TARGET_SSH_HOST}" "rm -f '${BACKEND_APP_DIR}/app.jar.candidate'"
          scp app.jar "${TARGET_SSH_HOST}:${BACKEND_APP_DIR}/app.jar.candidate"

      - name: Repair Flyway failed migrations
        if: steps.branch_guard.outputs.should_deploy == 'true'
        continue-on-error: true
        env:
          SPRING_DB_URL: ${{ secrets.SPRING_DB_URL }}
          SPRING_DB_USERNAME: ${{ secrets.SPRING_DB_USERNAME }}
          SPRING_DB_PASSWORD: ${{ secrets.SPRING_DB_PASSWORD }}
          FLYWAY_V19_CHECKSUM: ${{ steps.v19_checksum.outputs.value }}
          TARGET_SSH_HOST: ${{ steps.ssh_config.outputs.target_host }}
        run: |
            set -euo pipefail
            SPRING_DB_URL_B64="$(printf '%s' "${SPRING_DB_URL}" | base64 | tr -d '\n')"
            SPRING_DB_USERNAME_B64="$(printf '%s' "${SPRING_DB_USERNAME}" | base64 | tr -d '\n')"
            SPRING_DB_PASSWORD_B64="$(printf '%s' "${SPRING_DB_PASSWORD}" | base64 | tr -d '\n')"
            FLYWAY_V19_CHECKSUM_B64="$(printf '%s' "${FLYWAY_V19_CHECKSUM}" | base64 | tr -d '\n')"
            ssh "${TARGET_SSH_HOST}" \
              "SPRING_DB_URL_B64='${SPRING_DB_URL_B64}' SPRING_DB_USERNAME_B64='${SPRING_DB_USERNAME_B64}' SPRING_DB_PASSWORD_B64='${SPRING_DB_PASSWORD_B64}' FLYWAY_V19_CHECKSUM_B64='${FLYWAY_V19_CHECKSUM_B64}' bash -se" <<'REMOTE'
            set -euo pipefail
            SPRING_DB_URL="$(printf '%s' "${SPRING_DB_URL_B64}" | base64 -d)"
            SPRING_DB_USERNAME="$(printf '%s' "${SPRING_DB_USERNAME_B64}" | base64 -d)"
            SPRING_DB_PASSWORD="$(printf '%s' "${SPRING_DB_PASSWORD_B64}" | base64 -d)"

            # Parse JDBC URL: jdbc:mysql://host:port/dbname?params
            DB_RAW="${SPRING_DB_URL#jdbc:mysql://}"
            DB_RAW="${DB_RAW%%\?*}"
            DB_HOSTPORT="${DB_RAW%%/*}"
            DB_NAME="${DB_RAW#*/}"
            DB_HOST="${DB_HOSTPORT%%:*}"
            DB_PORT="${DB_HOSTPORT##*:}"
            if [ "${DB_HOST}" = "${DB_PORT}" ] || [ -z "${DB_PORT}" ]; then
              DB_PORT="3306"
            fi
            if [ -z "${DB_HOST// }" ] || [ -z "${DB_NAME// }" ]; then
              echo "ERROR: Unable to parse SPRING_DB_URL for Flyway repair step."
              exit 1
            fi
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:${PATH:-}"
            echo "Repair host: $(hostname) user=$(whoami) uid=$(id -u)"
            echo "PATH=${PATH}"

            find_mysql_bin() {
              MYSQL_BIN="$(command -v mysql || true)"
              if [ -z "${MYSQL_BIN}" ]; then
                for c in /usr/bin/mysql /usr/local/bin/mysql /usr/local/mysql/bin/mysql /bin/mysql; do
                  if [ -x "${c}" ]; then
                    MYSQL_BIN="${c}"
                    break
                  fi
                done
              fi
              [ -n "${MYSQL_BIN}" ]
            }

            mysql8_ready() {
              if ! find_mysql_bin; then
                return 1
              fi
              MYSQL_VERSION_RAW="$("${MYSQL_BIN}" --version 2>/dev/null || true)"
              if echo "${MYSQL_VERSION_RAW}" | grep -Eiq 'mariadb'; then
                return 1
              fi
              MYSQL_VERSION_SEMVER="$(echo "${MYSQL_VERSION_RAW}" | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)"
              MYSQL_MAJOR="${MYSQL_VERSION_SEMVER%%.*}"
              [ -n "${MYSQL_MAJOR}" ] && [ "${MYSQL_MAJOR}" -ge 8 ]
            }

            run_with_priv() {
              if [ "$(id -u)" -eq 0 ]; then
                "$@"
                return $?
              fi
              if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
                sudo "$@"
                return $?
              fi
              return 1
            }

            if ! mysql8_ready; then
              echo "WARN: MySQL 8.0+ client not found on backend host. Attempting installation..."
              echo "Package manager probe: apt-get=$(command -v apt-get || echo '<none>') dnf=$(command -v dnf || echo '<none>') yum=$(command -v yum || echo '<none>')"
              if command -v apt-get >/dev/null 2>&1; then
                run_with_priv apt-get update -y || true
                run_with_priv env DEBIAN_FRONTEND=noninteractive apt-get install -y mysql-client-8.0 || true
                run_with_priv env DEBIAN_FRONTEND=noninteractive apt-get install -y mysql-client-core-8.0 || true
              elif command -v dnf >/dev/null 2>&1; then
                run_with_priv dnf install -y mysql-community-client || true
              elif command -v yum >/dev/null 2>&1; then
                run_with_priv yum install -y mysql-community-client || true
              else
                echo "WARN: No supported package manager detected for mysql client installation."
              fi
              if find_mysql_bin; then
                echo "Post-install mysql binary: ${MYSQL_BIN}"
              fi
            fi

            if ! mysql8_ready; then
              echo "ERROR: MySQL 8.0+ client is required for Flyway repair step."
              if find_mysql_bin; then
                echo "       mysql binary: ${MYSQL_BIN}"
                echo "       mysql --version: $("${MYSQL_BIN}" --version 2>/dev/null || true)"
              else
                echo "       mysql binary: <not found in PATH or common locations>"
              fi
              echo "       Ensure 'mysql --version' reports MySQL 8.x (not MariaDB) on backend host."
              exit 1
            fi

            echo "Using DB client (${MYSQL_BIN}): $("${MYSQL_BIN}" --version)"

            mysql_scalar() {
              local sql="$1"
              "${MYSQL_BIN}" -h "${DB_HOST}" -P "${DB_PORT}" \
                -u "${SPRING_DB_USERNAME}" -p"${SPRING_DB_PASSWORD}" \
                --skip-column-names --silent \
                "${DB_NAME}" \
                -e "${sql}"
            }

            HAS_HISTORY=$(mysql_scalar "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='${DB_NAME}' AND table_name='flyway_schema_history';")
            if [ "${HAS_HISTORY}" -eq 0 ]; then
              echo "No flyway_schema_history table found. Skipping repair."
              exit 0
            fi

            FAILED_ANY=$(mysql_scalar "SELECT COUNT(*) FROM flyway_schema_history WHERE success=0;")
            if [ "${FAILED_ANY}" -eq 0 ]; then
              echo "No failed migrations found. Skipping repair."
              exit 0
            fi

            FAILED_V7=$(mysql_scalar "SELECT COUNT(*) FROM flyway_schema_history WHERE success=0 AND version='7';")
            FAILED_V8=$(mysql_scalar "SELECT COUNT(*) FROM flyway_schema_history WHERE success=0 AND version='8';")
            FAILED_OTHER=$(mysql_scalar "SELECT COUNT(*) FROM flyway_schema_history WHERE success=0 AND (version IS NULL OR version NOT IN ('7','8'));")

            if [ "${FAILED_OTHER}" -gt 0 ]; then
              FAILED_VERSIONS=$(mysql_scalar "SELECT IFNULL(GROUP_CONCAT(COALESCE(version,'<null>') ORDER BY installed_rank SEPARATOR ','), '') FROM flyway_schema_history WHERE success=0;")
              echo "ERROR: Found unsupported failed migration versions: ${FAILED_VERSIONS}"
              echo "This auto-repair step handles only V7/V8 document storage migrations."
              exit 1
            fi

            if [ "${FAILED_V7}" -gt 0 ]; then
              SUCCESS_V7=$(mysql_scalar "SELECT COUNT(*) FROM flyway_schema_history WHERE success=1 AND version='7';")
              if [ "${SUCCESS_V7}" -gt 0 ]; then
                echo "ERROR: V7 has both success and failure records. Manual intervention required."
                exit 1
              fi

              echo "Repairing failed V7 migration: drop document tables and clear failed V7/V8 rows."
              mysql_scalar "SET FOREIGN_KEY_CHECKS=0; DROP TABLE IF EXISTS document_backup_jobs; DROP TABLE IF EXISTS document_files; SET FOREIGN_KEY_CHECKS=1; DELETE FROM flyway_schema_history WHERE success=0 AND version IN ('7','8');"
              echo "V7 repair completed."
              exit 0
            fi

            if [ "${FAILED_V8}" -gt 0 ]; then
              echo "Repairing failed V8 migration: drop backup job table and clear failed V8 rows."
              mysql_scalar "SET FOREIGN_KEY_CHECKS=0; DROP TABLE IF EXISTS document_backup_jobs; SET FOREIGN_KEY_CHECKS=1; DELETE FROM flyway_schema_history WHERE success=0 AND version='8';"
              echo "V8 repair completed."
              exit 0
            fi

            echo "No eligible failed migration versions found for auto-repair."
            exit 0
            REMOTE

      - name: Restart backend (Cloudflare SSH)
        if: steps.branch_guard.outputs.should_deploy == 'true'
        env:
          DEPLOY_RUN_ID: ${{ github.run_id }}
          DEPLOY_RUN_ATTEMPT: ${{ github.run_attempt }}
          TARGET_SLOT: ${{ github.event.inputs.target_slot }}
          BACKEND_HEALTH_URL: ${{ steps.slot_config.outputs.backend_health_url }}
          BACKEND_APP_DIR: ${{ secrets.BACKEND_APP_DIR }}
          TARGET_SSH_HOST: ${{ steps.ssh_config.outputs.target_host }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ACCESS_EXPIRATION: ${{ secrets.JWT_ACCESS_EXPIRATION }}
          AI_SERVER_BASE_URL: ${{ secrets.AI_SERVER_BASE_URL }}
          AI_SERVER_CONNECT_TIMEOUT_MS: ${{ secrets.AI_SERVER_CONNECT_TIMEOUT_MS }}
          AI_SERVER_READ_TIMEOUT_MS: ${{ secrets.AI_SERVER_READ_TIMEOUT_MS }}
          AI_SERVER_ASYNC_READ_TIMEOUT_MS: ${{ secrets.AI_SERVER_ASYNC_READ_TIMEOUT_MS }}
          TURNSTILE_ENABLED: ${{ secrets.TURNSTILE_ENABLED }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          TURNSTILE_SITEVERIFY_URL: ${{ secrets.TURNSTILE_SITEVERIFY_URL }}
          TURNSTILE_CONNECT_TIMEOUT_MS: ${{ secrets.TURNSTILE_CONNECT_TIMEOUT_MS }}
          TURNSTILE_READ_TIMEOUT_MS: ${{ secrets.TURNSTILE_READ_TIMEOUT_MS }}
          LOGIN_RATE_LIMIT_ENABLED: ${{ secrets.LOGIN_RATE_LIMIT_ENABLED }}
          LOGIN_RATE_LIMIT_ACCOUNT_MAX_FAILURES: ${{ secrets.LOGIN_RATE_LIMIT_ACCOUNT_MAX_FAILURES }}
          LOGIN_RATE_LIMIT_IP_MAX_FAILURES: ${{ secrets.LOGIN_RATE_LIMIT_IP_MAX_FAILURES }}
          LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${{ secrets.LOGIN_RATE_LIMIT_WINDOW_SECONDS }}
          LOGIN_RATE_LIMIT_LOCK_SECONDS: ${{ secrets.LOGIN_RATE_LIMIT_LOCK_SECONDS }}
          SPRING_DB_URL: ${{ secrets.SPRING_DB_URL }}
          SPRING_DB_USERNAME: ${{ secrets.SPRING_DB_USERNAME }}
          SPRING_DB_PASSWORD: ${{ secrets.SPRING_DB_PASSWORD }}
          SPRING_DB_DRIVER_CLASS_NAME: ${{ secrets.SPRING_DB_DRIVER_CLASS_NAME }}
          SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${{ secrets.SPRING_FLYWAY_BASELINE_ON_MIGRATE }}
          SPRING_FLYWAY_BASELINE_VERSION: ${{ secrets.SPRING_FLYWAY_BASELINE_VERSION }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}
          RABBITMQ_HOST: ${{ secrets.RABBITMQ_HOST }}
          RABBITMQ_PORT: ${{ secrets.RABBITMQ_PORT }}
          RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          RABBITMQ_VHOST: ${{ secrets.RABBITMQ_VHOST }}
          RABBITMQ_EXCHANGE: ${{ secrets.RABBITMQ_EXCHANGE }}
          RABBITMQ_QUEUE_REPORT: ${{ secrets.RABBITMQ_QUEUE_REPORT }}
          RABBITMQ_QUEUE_DLQ: ${{ secrets.RABBITMQ_QUEUE_DLQ }}
          RABBITMQ_QUEUE_INTERNAL_TASKS: ${{ secrets.RABBITMQ_QUEUE_INTERNAL_TASKS }}
          RABBITMQ_INTERNAL_TASKS_DLQ_ROUTING_KEY: ${{ secrets.RABBITMQ_INTERNAL_TASKS_DLQ_ROUTING_KEY }}
          INTERNAL_TASK_CONSUMER_ENABLED: ${{ secrets.INTERNAL_TASK_CONSUMER_ENABLED }}
          INTERNAL_TASK_CONSUMER_DRY_RUN: ${{ secrets.INTERNAL_TASK_CONSUMER_DRY_RUN }}
          INTERNAL_TASK_CONSUMER_CONCURRENCY: ${{ secrets.INTERNAL_TASK_CONSUMER_CONCURRENCY }}
          STORAGE_API_AUTH_ENABLED: ${{ secrets.STORAGE_API_AUTH_ENABLED }}
          STORAGE_API_KEY_ID: ${{ secrets.STORAGE_API_KEY_ID }}
          STORAGE_API_KEY_VALUE: ${{ secrets.STORAGE_API_KEY_VALUE }}
          STORAGE_API_GLOBAL_ACCESS: ${{ secrets.STORAGE_API_GLOBAL_ACCESS }}
          STORAGE_API_KEY_ACTIVE: ${{ secrets.STORAGE_API_KEY_ACTIVE }}
          STORAGE_PROVIDER: ${{ secrets.STORAGE_PROVIDER }}
          STORAGE_LOCAL_BASE_DIR: ${{ secrets.STORAGE_LOCAL_BASE_DIR }}
          STORAGE_MAX_DOCUMENT_SIZE_MB: ${{ secrets.STORAGE_MAX_DOCUMENT_SIZE_MB }}
          STORAGE_MAX_IMAGE_SIZE_MB: ${{ secrets.STORAGE_MAX_IMAGE_SIZE_MB }}
          STORAGE_DOWNLOAD_URL_TTL_SECONDS: ${{ secrets.STORAGE_DOWNLOAD_URL_TTL_SECONDS }}
          STORAGE_RETRY_ENABLED: ${{ secrets.STORAGE_RETRY_ENABLED }}
          STORAGE_RETRY_MAX_ATTEMPTS: ${{ secrets.STORAGE_RETRY_MAX_ATTEMPTS }}
          STORAGE_RETRY_INTERVAL_MS: ${{ secrets.STORAGE_RETRY_INTERVAL_MS }}
          STORAGE_RETRY_BASE_BACKOFF_SECONDS: ${{ secrets.STORAGE_RETRY_BASE_BACKOFF_SECONDS }}
          STORAGE_RETRY_MAX_BACKOFF_SECONDS: ${{ secrets.STORAGE_RETRY_MAX_BACKOFF_SECONDS }}
          STORAGE_RETRY_BATCH_SIZE: ${{ secrets.STORAGE_RETRY_BATCH_SIZE }}
          STORAGE_OCI_CLI_EXECUTABLE: ${{ secrets.STORAGE_OCI_CLI_EXECUTABLE }}
          STORAGE_OCI_PRIMARY_PROFILE: ${{ secrets.STORAGE_OCI_PRIMARY_PROFILE }}
          STORAGE_OCI_BACKUP_PROFILE: ${{ secrets.STORAGE_OCI_BACKUP_PROFILE }}
          STORAGE_OCI_REGION: ${{ secrets.STORAGE_OCI_REGION }}
          STORAGE_OCI_PUBLIC_ENDPOINT: ${{ secrets.STORAGE_OCI_PUBLIC_ENDPOINT }}
          STORAGE_OCI_PREAUTH_TTL_SECONDS: ${{ secrets.STORAGE_OCI_PREAUTH_TTL_SECONDS }}
          STORAGE_OCI_SUPPRESS_PERMISSIONS_WARNING: ${{ secrets.STORAGE_OCI_SUPPRESS_PERMISSIONS_WARNING }}
          STORAGE_PRIMARY_NAMESPACE: ${{ secrets.STORAGE_PRIMARY_NAMESPACE }}
          STORAGE_PRIMARY_BUCKET: ${{ secrets.STORAGE_PRIMARY_BUCKET }}
          STORAGE_BACKUP_NAMESPACE: ${{ secrets.STORAGE_BACKUP_NAMESPACE }}
          STORAGE_BACKUP_BUCKET: ${{ secrets.STORAGE_BACKUP_BUCKET }}
          CORS_ALLOWED_ORIGIN_PATTERNS: ${{ secrets.CORS_ALLOWED_ORIGIN_PATTERNS }}
        run: |
          set -euo pipefail

          APP_DIR="${BACKEND_APP_DIR}"
          LOCAL_ENV_FILE="backend.env.tmp"
          REMOTE_ENV_FILE="${APP_DIR}/backend.env.tmp"

          urldecode() {
            local data="${1//+/ }"
            printf '%b' "${data//%/\\x}"
          }

          RABBITMQ_HOST_EFFECTIVE="${RABBITMQ_HOST:-}"
          RABBITMQ_PORT_EFFECTIVE="${RABBITMQ_PORT:-}"
          RABBITMQ_USERNAME_EFFECTIVE="${RABBITMQ_USERNAME:-}"
          RABBITMQ_PASSWORD_EFFECTIVE="${RABBITMQ_PASSWORD:-}"
          RABBITMQ_VHOST_EFFECTIVE="${RABBITMQ_VHOST:-}"

          rabbitmq_no_scheme="${RABBITMQ_URL#*://}"
          rabbitmq_authority="${rabbitmq_no_scheme%%/*}"
          rabbitmq_path="/${rabbitmq_no_scheme#*/}"

          if [ "${rabbitmq_authority}" = "${rabbitmq_no_scheme}" ]; then
            echo "Invalid RABBITMQ_URL: missing path/vhost (${RABBITMQ_URL})"
            exit 1
          fi

          rabbitmq_hostport="${rabbitmq_authority}"
          if [[ "${rabbitmq_authority}" == *"@"* ]]; then
            rabbitmq_auth="${rabbitmq_authority%@*}"
            rabbitmq_hostport="${rabbitmq_authority#*@}"
            if [ -z "${RABBITMQ_USERNAME_EFFECTIVE}" ]; then
              RABBITMQ_USERNAME_EFFECTIVE="$(urldecode "${rabbitmq_auth%%:*}")"
            fi
            if [ -z "${RABBITMQ_PASSWORD_EFFECTIVE}" ] && [[ "${rabbitmq_auth}" == *":"* ]]; then
              RABBITMQ_PASSWORD_EFFECTIVE="$(urldecode "${rabbitmq_auth#*:}")"
            fi
          fi

          if [ -z "${RABBITMQ_HOST_EFFECTIVE}" ]; then
            RABBITMQ_HOST_EFFECTIVE="${rabbitmq_hostport%%:*}"
          fi
          if [ -z "${RABBITMQ_PORT_EFFECTIVE}" ]; then
            if [[ "${rabbitmq_hostport}" == *":"* ]]; then
              RABBITMQ_PORT_EFFECTIVE="${rabbitmq_hostport##*:}"
            else
              RABBITMQ_PORT_EFFECTIVE="5672"
            fi
          fi
          if [ -z "${RABBITMQ_VHOST_EFFECTIVE}" ]; then
            rabbitmq_vhost_encoded="${rabbitmq_path#/}"
            RABBITMQ_VHOST_EFFECTIVE="$(urldecode "${rabbitmq_vhost_encoded}")"
          fi
          if [ -z "${RABBITMQ_VHOST_EFFECTIVE}" ]; then
            RABBITMQ_VHOST_EFFECTIVE="/"
          fi

          if [ -z "${RABBITMQ_USERNAME_EFFECTIVE}" ] || [ -z "${RABBITMQ_PASSWORD_EFFECTIVE}" ]; then
            echo "Missing RabbitMQ credentials. Set RABBITMQ_USERNAME/RABBITMQ_PASSWORD secrets or provide credentials in RABBITMQ_URL."
            exit 1
          fi
          if [ "${RABBITMQ_HOST_EFFECTIVE}" = "localhost" ] || [ "${RABBITMQ_HOST_EFFECTIVE}" = "127.0.0.1" ]; then
            echo "Invalid RabbitMQ host for production: ${RABBITMQ_HOST_EFFECTIVE}"
            exit 1
          fi

          cat > "${LOCAL_ENV_FILE}" <<EOF
          JWT_SECRET=${JWT_SECRET}
          JWT_ACCESS_EXPIRATION=${JWT_ACCESS_EXPIRATION}
          AI_SERVER_BASE_URL=${AI_SERVER_BASE_URL}
          AI_SERVER_CONNECT_TIMEOUT_MS=${AI_SERVER_CONNECT_TIMEOUT_MS}
          AI_SERVER_READ_TIMEOUT_MS=${AI_SERVER_READ_TIMEOUT_MS}
          AI_SERVER_ASYNC_READ_TIMEOUT_MS=${AI_SERVER_ASYNC_READ_TIMEOUT_MS}
          TURNSTILE_ENABLED=${TURNSTILE_ENABLED:-false}
          TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-}
          TURNSTILE_SITEVERIFY_URL=${TURNSTILE_SITEVERIFY_URL:-https://challenges.cloudflare.com/turnstile/v0/siteverify}
          TURNSTILE_CONNECT_TIMEOUT_MS=${TURNSTILE_CONNECT_TIMEOUT_MS:-5000}
          TURNSTILE_READ_TIMEOUT_MS=${TURNSTILE_READ_TIMEOUT_MS:-10000}
          LOGIN_RATE_LIMIT_ENABLED=${LOGIN_RATE_LIMIT_ENABLED:-true}
          LOGIN_RATE_LIMIT_ACCOUNT_MAX_FAILURES=${LOGIN_RATE_LIMIT_ACCOUNT_MAX_FAILURES:-5}
          LOGIN_RATE_LIMIT_IP_MAX_FAILURES=${LOGIN_RATE_LIMIT_IP_MAX_FAILURES:-20}
          LOGIN_RATE_LIMIT_WINDOW_SECONDS=${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-600}
          LOGIN_RATE_LIMIT_LOCK_SECONDS=${LOGIN_RATE_LIMIT_LOCK_SECONDS:-900}
          SPRING_DB_URL=${SPRING_DB_URL}
          SPRING_DB_USERNAME=${SPRING_DB_USERNAME}
          SPRING_DB_PASSWORD=${SPRING_DB_PASSWORD}
          SPRING_DB_DRIVER_CLASS_NAME=${SPRING_DB_DRIVER_CLASS_NAME}
          SPRING_FLYWAY_BASELINE_ON_MIGRATE=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:-true}
          SPRING_FLYWAY_BASELINE_VERSION=${SPRING_FLYWAY_BASELINE_VERSION:-0}
          REDIS_URL=${REDIS_URL}
          RABBITMQ_URL=${RABBITMQ_URL}
          SPRING_RABBITMQ_HOST=${RABBITMQ_HOST_EFFECTIVE}
          SPRING_RABBITMQ_PORT=${RABBITMQ_PORT_EFFECTIVE}
          SPRING_RABBITMQ_USERNAME=${RABBITMQ_USERNAME_EFFECTIVE}
          SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD_EFFECTIVE}
          SPRING_RABBITMQ_VIRTUAL_HOST=${RABBITMQ_VHOST_EFFECTIVE}
          RABBITMQ_EXCHANGE=${RABBITMQ_EXCHANGE}
          RABBITMQ_QUEUE_REPORT=${RABBITMQ_QUEUE_REPORT}
          RABBITMQ_QUEUE_DLQ=${RABBITMQ_QUEUE_DLQ}
          RABBITMQ_QUEUE_INTERNAL_TASKS=${RABBITMQ_QUEUE_INTERNAL_TASKS:-q.internal.tasks}
          RABBITMQ_INTERNAL_TASKS_DLQ_ROUTING_KEY=${RABBITMQ_INTERNAL_TASKS_DLQ_ROUTING_KEY:-internal.tasks.dlq}
          INTERNAL_TASK_CONSUMER_ENABLED=${INTERNAL_TASK_CONSUMER_ENABLED:-false}
          INTERNAL_TASK_CONSUMER_DRY_RUN=${INTERNAL_TASK_CONSUMER_DRY_RUN:-true}
          INTERNAL_TASK_CONSUMER_CONCURRENCY=${INTERNAL_TASK_CONSUMER_CONCURRENCY:-1}
          STORAGE_API_AUTH_ENABLED=${STORAGE_API_AUTH_ENABLED}
          STORAGE_API_KEY_ID=${STORAGE_API_KEY_ID:-storage-admin}
          STORAGE_API_KEY_VALUE=${STORAGE_API_KEY_VALUE}
          STORAGE_API_GLOBAL_ACCESS=${STORAGE_API_GLOBAL_ACCESS}
          STORAGE_API_KEY_ACTIVE=${STORAGE_API_KEY_ACTIVE}
          STORAGE_PROVIDER=${STORAGE_PROVIDER}
          STORAGE_LOCAL_BASE_DIR=${STORAGE_LOCAL_BASE_DIR}
          STORAGE_MAX_DOCUMENT_SIZE_MB=${STORAGE_MAX_DOCUMENT_SIZE_MB}
          STORAGE_MAX_IMAGE_SIZE_MB=${STORAGE_MAX_IMAGE_SIZE_MB}
          STORAGE_DOWNLOAD_URL_TTL_SECONDS=${STORAGE_DOWNLOAD_URL_TTL_SECONDS}
          STORAGE_RETRY_ENABLED=${STORAGE_RETRY_ENABLED}
          STORAGE_RETRY_MAX_ATTEMPTS=${STORAGE_RETRY_MAX_ATTEMPTS}
          STORAGE_RETRY_INTERVAL_MS=${STORAGE_RETRY_INTERVAL_MS}
          STORAGE_RETRY_BASE_BACKOFF_SECONDS=${STORAGE_RETRY_BASE_BACKOFF_SECONDS}
          STORAGE_RETRY_MAX_BACKOFF_SECONDS=${STORAGE_RETRY_MAX_BACKOFF_SECONDS}
          STORAGE_RETRY_BATCH_SIZE=${STORAGE_RETRY_BATCH_SIZE}
          STORAGE_OCI_CLI_EXECUTABLE=${STORAGE_OCI_CLI_EXECUTABLE}
          STORAGE_OCI_PRIMARY_PROFILE=${STORAGE_OCI_PRIMARY_PROFILE}
          STORAGE_OCI_BACKUP_PROFILE=${STORAGE_OCI_BACKUP_PROFILE}
          STORAGE_OCI_REGION=${STORAGE_OCI_REGION:-}
          STORAGE_OCI_PUBLIC_ENDPOINT=${STORAGE_OCI_PUBLIC_ENDPOINT:-}
          STORAGE_OCI_PREAUTH_TTL_SECONDS=${STORAGE_OCI_PREAUTH_TTL_SECONDS:-900}
          STORAGE_OCI_SUPPRESS_PERMISSIONS_WARNING=${STORAGE_OCI_SUPPRESS_PERMISSIONS_WARNING}
          STORAGE_PRIMARY_NAMESPACE=${STORAGE_PRIMARY_NAMESPACE}
          STORAGE_PRIMARY_BUCKET=${STORAGE_PRIMARY_BUCKET}
          STORAGE_BACKUP_NAMESPACE=${STORAGE_BACKUP_NAMESPACE}
          STORAGE_BACKUP_BUCKET=${STORAGE_BACKUP_BUCKET}
          CORS_ALLOWED_ORIGIN_PATTERNS=${CORS_ALLOWED_ORIGIN_PATTERNS:-https://withbuddy.itsdev.kr,https://*.vercel.app}
          SPRING_PROFILES_ACTIVE=prod
          EOF
          chmod 600 "${LOCAL_ENV_FILE}"

          scp "${LOCAL_ENV_FILE}" "${TARGET_SSH_HOST}:${REMOTE_ENV_FILE}"
          rm -f "${LOCAL_ENV_FILE}"

          printf -v APP_DIR_Q '%q' "${BACKEND_APP_DIR}"
          printf -v HEALTH_URL_Q '%q' "${BACKEND_HEALTH_URL}"
          printf -v DEPLOY_RUN_ID_Q '%q' "${DEPLOY_RUN_ID}"
          printf -v DEPLOY_RUN_ATTEMPT_Q '%q' "${DEPLOY_RUN_ATTEMPT}"
          printf -v TARGET_SLOT_Q '%q' "${TARGET_SLOT}"
          ssh "${TARGET_SSH_HOST}" "BACKEND_APP_DIR=${APP_DIR_Q} BACKEND_HEALTH_URL=${HEALTH_URL_Q} DEPLOY_RUN_ID=${DEPLOY_RUN_ID_Q} DEPLOY_RUN_ATTEMPT=${DEPLOY_RUN_ATTEMPT_Q} TARGET_SLOT=${TARGET_SLOT_Q} bash -s" <<'REMOTE_EOF'
            set -euo pipefail

            APP_DIR="${BACKEND_APP_DIR}"
            JAR_PATH="${APP_DIR}/app.jar"
            CANDIDATE_JAR_PATH="${APP_DIR}/app.jar.candidate"
            ENV_PATH="/etc/withbuddy-backend.env"
            TMP_ENV_PATH="${APP_DIR}/backend.env.tmp"
            DEPLOY_METADATA_PATH="${APP_DIR}/deploy-metadata.env"
            SERVICE_NAME="withbuddy-backend.service"
            RELEASE_ID="$(date +%Y%m%d%H%M%S)"
            BACKUP_DIR="${APP_DIR}/releases/${RELEASE_ID}"
            BACKUP_JAR_PATH="${BACKUP_DIR}/app.jar"
            BACKUP_ENV_PATH="${BACKUP_DIR}/withbuddy-backend.env"
            RELEASE_RETENTION_COUNT="${RELEASE_RETENTION_COUNT:-5}"
            HEALTH_URL="${BACKEND_HEALTH_URL:-http://127.0.0.1:8080/actuator/health/liveness}"
            FALLBACK_HEALTH_URL=""
            LOCAL_HEALTH_URL="http://127.0.0.1:8080/actuator/health/liveness"
            HAS_PREVIOUS_JAR="false"
            HAS_PREVIOUS_ENV="false"
            DEPLOYMENT_COMPLETED="false"
            case "${HEALTH_URL}" in
              */actuator/health)
                FALLBACK_HEALTH_URL="${HEALTH_URL}/liveness"
                ;;
            esac

            mkdir -p "${APP_DIR}" "${APP_DIR}/logs" "${APP_DIR}/releases"
            test -f "${CANDIDATE_JAR_PATH}"
            test -f "${TMP_ENV_PATH}"

            cleanup_on_exit() {
              if [ "${DEPLOYMENT_COMPLETED}" != "true" ]; then
                rm -f "${CANDIDATE_JAR_PATH}" || true
              fi
              rm -f "${TMP_ENV_PATH}" || true
            }

            trap cleanup_on_exit EXIT

            # Read dependency URLs from tmp env before installing the final root-only env file.
            EFFECTIVE_REDIS_URL="$(awk -F= '/^REDIS_URL=/{print substr($0, index($0, "=")+1); exit}' "${TMP_ENV_PATH}")"
            EFFECTIVE_RABBITMQ_URL="$(awk -F= '/^RABBITMQ_URL=/{print substr($0, index($0, "=")+1); exit}' "${TMP_ENV_PATH}")"

            if [ -z "${EFFECTIVE_REDIS_URL}" ] || [ -z "${EFFECTIVE_RABBITMQ_URL}" ]; then
              echo "ERROR: Missing REDIS_URL or RABBITMQ_URL in ${TMP_ENV_PATH}"
              exit 1
            fi

            extract_host_port() {
              local url="$1"
              local default_port="$2"
              local without_scheme="${url#*://}"
              local without_auth="${without_scheme#*@}"
              local hostport="${without_auth%%/*}"
              local host="${hostport%%:*}"
              local port="${hostport##*:}"

              if [ -z "${host}" ]; then
                return 1
              fi
              if [ "${host}" = "${port}" ] || [ -z "${port}" ]; then
                port="${default_port}"
              fi
              echo "${host} ${port}"
            }

            can_connect_tcp() {
              local host="$1"
              local port="$2"
              timeout 2 bash -c "cat < /dev/null > /dev/tcp/${host}/${port}" >/dev/null 2>&1
            }

            wait_for_dependency() {
              local label="$1"
              local host="$2"
              local port="$3"
              for i in {1..12}; do
                if can_connect_tcp "${host}" "${port}"; then
                  echo "${label} reachable: ${host}:${port} (attempt ${i})"
                  return 0
                fi
                echo "${label} not reachable yet: ${host}:${port} (attempt ${i}/12), retrying in 5s..."
                sleep 5
              done
              echo "ERROR: ${label} unreachable: ${host}:${port}"
              return 1
            }

            read REDIS_HOST REDIS_PORT < <(extract_host_port "${EFFECTIVE_REDIS_URL}" "6379")
            read RABBITMQ_HOST RABBITMQ_PORT < <(extract_host_port "${EFFECTIVE_RABBITMQ_URL}" "5672")
            wait_for_dependency "Redis" "${REDIS_HOST}" "${REDIS_PORT}"
            wait_for_dependency "RabbitMQ" "${RABBITMQ_HOST}" "${RABBITMQ_PORT}"

            collect_diagnostics() {
              echo "Collecting service diagnostics..."
              sudo systemctl status "${SERVICE_NAME}" --no-pager -l || true
              sudo journalctl -u "${SERVICE_NAME}" -n 300 --no-pager || true
            }

            health_check_with_retries() {
              for i in {1..12}; do
                if curl -fsS "${HEALTH_URL}"; then
                  echo "Health check succeeded on attempt ${i}"
                  return 0
                fi
                if [ -n "${FALLBACK_HEALTH_URL}" ] && curl -fsS "${FALLBACK_HEALTH_URL}"; then
                  echo "Health check succeeded on attempt ${i} (liveness fallback)"
                  return 0
                fi
                if [ "${LOCAL_HEALTH_URL}" != "${HEALTH_URL}" ] && [ "${LOCAL_HEALTH_URL}" != "${FALLBACK_HEALTH_URL}" ] && curl -fsS "${LOCAL_HEALTH_URL}"; then
                  echo "Health check succeeded on attempt ${i} (local liveness fallback)"
                  return 0
                fi

                if ! sudo systemctl is-active --quiet "${SERVICE_NAME}"; then
                  echo "Service became inactive while waiting for health check (attempt ${i})."
                  return 1
                fi

                echo "Health check failed on attempt ${i}, retrying in 5s..."
                sleep 5
              done

              echo "Health check failed after retries."
              return 1
            }

            backup_current_release() {
              mkdir -p "${BACKUP_DIR}"
              if [ -f "${JAR_PATH}" ]; then
                cp "${JAR_PATH}" "${BACKUP_JAR_PATH}"
                HAS_PREVIOUS_JAR="true"
              fi
              if sudo test -f "${ENV_PATH}"; then
                sudo cp "${ENV_PATH}" "${BACKUP_ENV_PATH}"
                sudo chown "$(id -un)":"$(id -gn)" "${BACKUP_ENV_PATH}"
                HAS_PREVIOUS_ENV="true"
              fi
            }

            cleanup_old_releases() {
              if ! [[ "${RELEASE_RETENTION_COUNT}" =~ ^[0-9]+$ ]] || [ "${RELEASE_RETENTION_COUNT}" -lt 1 ]; then
                echo "Invalid RELEASE_RETENTION_COUNT=${RELEASE_RETENTION_COUNT}, skipping release cleanup."
                return 0
              fi

              mapfile -t release_dirs < <(find "${APP_DIR}/releases" -mindepth 1 -maxdepth 1 -type d | sort)
              release_count="${#release_dirs[@]}"
              if [ "${release_count}" -le "${RELEASE_RETENTION_COUNT}" ]; then
                return 0
              fi

              delete_count=$((release_count - RELEASE_RETENTION_COUNT))
              for ((idx=0; idx<delete_count; idx++)); do
                rm -rf "${release_dirs[$idx]}"
              done
            }

            restore_previous_release() {
              echo "Attempting automatic rollback to previous backend release..."
              if [ "${HAS_PREVIOUS_JAR}" != "true" ] && [ "${HAS_PREVIOUS_ENV}" != "true" ]; then
                echo "No previous release backup available. Skipping rollback attempt."
                return 1
              fi

              if [ "${HAS_PREVIOUS_JAR}" = "true" ] && [ -f "${BACKUP_JAR_PATH}" ]; then
                cp "${BACKUP_JAR_PATH}" "${JAR_PATH}"
              else
                echo "No previous app.jar backup available."
              fi

              if [ "${HAS_PREVIOUS_ENV}" = "true" ] && [ -f "${BACKUP_ENV_PATH}" ]; then
                sudo install -m 600 "${BACKUP_ENV_PATH}" "${ENV_PATH}"
              else
                echo "No previous env backup available."
              fi

              if ! sudo systemctl restart "${SERVICE_NAME}"; then
                echo "Service restart failed during rollback."
                return 1
              fi
              if health_check_with_retries; then
                echo "Automatic rollback succeeded."
                print_flyway_recovery_hint_if_needed
                return 0
              fi

              echo "Automatic rollback failed."
              return 1
            }

            print_flyway_recovery_hint_if_needed() {
              if sudo journalctl -u "${SERVICE_NAME}" -n 300 --no-pager | grep -Eiq "FlywayValidateException|Detected failed migration to version|Migrations have failed validation"; then
                echo "Detected Flyway validation failure in service logs."
                echo "Suggested recovery commands on backend host (verify in production DB before executing):"
                echo "1) Stop service"
                echo "   sudo systemctl stop \"${SERVICE_NAME}\""
                echo ""
                echo "2) Check Flyway history"
                echo "   SELECT installed_rank, version, description, success"
                echo "   FROM flyway_schema_history"
                echo "   WHERE version IN ('7','8','9','10')"
                echo "   ORDER BY installed_rank;"
                echo ""
                echo "3) If version 7 failed and document storage tables are safe to recreate"
                echo "   SET FOREIGN_KEY_CHECKS=0;"
                echo "   DROP TABLE IF EXISTS document_backup_jobs;"
                echo "   DROP TABLE IF EXISTS document_files;"
                echo "   SET FOREIGN_KEY_CHECKS=1;"
                echo "   DELETE FROM flyway_schema_history WHERE version='7' AND success=0;"
                echo ""
                echo "4) Start service again"
                echo "   sudo systemctl start \"${SERVICE_NAME}\""
              fi
            }

            backup_current_release

            mv "${CANDIDATE_JAR_PATH}" "${JAR_PATH}"
            sudo install -m 600 "${TMP_ENV_PATH}" "${ENV_PATH}"
            rm -f "${TMP_ENV_PATH}"

            if ! sudo systemctl restart "${SERVICE_NAME}"; then
              echo "Service restart failed immediately after deployment."
              collect_diagnostics
              print_flyway_recovery_hint_if_needed
              if restore_previous_release; then
                exit 1
              fi
              collect_diagnostics
              print_flyway_recovery_hint_if_needed
              exit 1
            fi

            if health_check_with_retries; then
              DEPLOYMENT_COMPLETED="true"
              printf '%s\n' \
                "DEPLOY_RUN_ID=${DEPLOY_RUN_ID}" \
                "DEPLOY_RUN_ATTEMPT=${DEPLOY_RUN_ATTEMPT}" \
                "TARGET_SLOT=${TARGET_SLOT}" \
                "DEPLOY_RELEASE_ID=${RELEASE_ID}" \
                "DEPLOYED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                > "${DEPLOY_METADATA_PATH}.tmp"
              mv "${DEPLOY_METADATA_PATH}.tmp" "${DEPLOY_METADATA_PATH}"
              cleanup_old_releases
              echo "Deployment succeeded."
              exit 0
            fi

            collect_diagnostics
            print_flyway_recovery_hint_if_needed

            if restore_previous_release; then
              exit 1
            fi

            collect_diagnostics
            print_flyway_recovery_hint_if_needed
            exit 1
          REMOTE_EOF

  switch-traffic:
    needs: build-and-deploy
    if: needs.build-and-deploy.result == 'success' && github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && github.event.inputs.switch_traffic == 'true'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    concurrency:
      group: backend-traffic-switch
      cancel-in-progress: false

    steps:
      - name: Resolve traffic switch settings
        id: traffic_switch_config
        env:
          BLUE_BACKEND_ACCESS_HOST: ${{ secrets.BLUE_BACKEND_ACCESS_HOST }}
          GREEN_BACKEND_ACCESS_HOST: ${{ secrets.GREEN_BACKEND_ACCESS_HOST }}
          BLUE_BACKEND_SERVER_HOST: ${{ secrets.BLUE_BACKEND_SERVER_HOST }}
          GREEN_BACKEND_SERVER_HOST: ${{ secrets.GREEN_BACKEND_SERVER_HOST }}
          BLUE_BACKEND_SERVER_SSH_KEY: ${{ secrets.BLUE_BACKEND_SERVER_SSH_KEY }}
          GREEN_BACKEND_SERVER_SSH_KEY: ${{ secrets.GREEN_BACKEND_SERVER_SSH_KEY }}
          TRAFFIC_SWITCH_ACCESS_HOST: ${{ secrets.TRAFFIC_SWITCH_ACCESS_HOST }}
          TRAFFIC_SWITCH_SERVER_HOST: ${{ secrets.TRAFFIC_SWITCH_SERVER_HOST }}
          TRAFFIC_SWITCH_SERVER_SSH_KEY: ${{ secrets.TRAFFIC_SWITCH_SERVER_SSH_KEY }}
          TRAFFIC_SWITCH_PUBLIC_HEALTH_URL: ${{ secrets.TRAFFIC_SWITCH_PUBLIC_HEALTH_URL }}
          NGINX_ACTIVE_UPSTREAM_LINK: ${{ secrets.NGINX_ACTIVE_UPSTREAM_LINK }}
          NGINX_BLUE_UPSTREAM_CONF: ${{ secrets.NGINX_BLUE_UPSTREAM_CONF }}
          NGINX_GREEN_UPSTREAM_CONF: ${{ secrets.NGINX_GREEN_UPSTREAM_CONF }}
        shell: bash
        run: |
          set -euo pipefail

          TARGET_SLOT="${{ github.event.inputs.target_slot }}"
          LIVE_SLOT="${{ github.event.inputs.live_slot }}"

          if [ "${TARGET_SLOT}" = "${LIVE_SLOT}" ]; then
            echo "target_slot and live_slot must be different for blue/green deployment."
            exit 1
          fi

          ROUTER_ACCESS_HOST="${TRAFFIC_SWITCH_ACCESS_HOST:-${BLUE_BACKEND_ACCESS_HOST:-}}"
          ROUTER_SERVER_HOST="${TRAFFIC_SWITCH_SERVER_HOST:-${BLUE_BACKEND_SERVER_HOST:-}}"
          ROUTER_SSH_KEY="${TRAFFIC_SWITCH_SERVER_SSH_KEY:-${BLUE_BACKEND_SERVER_SSH_KEY:-}}"
          PUBLIC_HEALTH_URL="${TRAFFIC_SWITCH_PUBLIC_HEALTH_URL:-}"
          ACTIVE_UPSTREAM_LINK="${NGINX_ACTIVE_UPSTREAM_LINK:-/etc/nginx/conf.d/upstream-active.conf}"
          BLUE_UPSTREAM_CONF="${NGINX_BLUE_UPSTREAM_CONF:-/etc/nginx/conf.d/upstream-blue.conf}"
          GREEN_UPSTREAM_CONF="${NGINX_GREEN_UPSTREAM_CONF:-/etc/nginx/conf.d/upstream-green.conf}"

          if [ -z "${ROUTER_SERVER_HOST}" ]; then
            echo "Traffic switch host is missing. Set TRAFFIC_SWITCH_SERVER_HOST or BLUE_BACKEND_SERVER_HOST."
            exit 1
          fi
          if [ -z "${ROUTER_SSH_KEY}" ]; then
            echo "Traffic switch SSH key is missing. Set TRAFFIC_SWITCH_SERVER_SSH_KEY or BLUE_BACKEND_SERVER_SSH_KEY."
            exit 1
          fi
          if [ -z "${PUBLIC_HEALTH_URL}" ]; then
            echo "TRAFFIC_SWITCH_PUBLIC_HEALTH_URL secret is required when switch_traffic=true."
            exit 1
          fi

          case "${TARGET_SLOT}" in
            blue)
              TARGET_BACKEND_ACCESS_HOST="${BLUE_BACKEND_ACCESS_HOST:-}"
              TARGET_BACKEND_SERVER_HOST="${BLUE_BACKEND_SERVER_HOST:-}"
              TARGET_BACKEND_SERVER_SSH_KEY="${BLUE_BACKEND_SERVER_SSH_KEY:-}"
              TARGET_UPSTREAM_CONF="${BLUE_UPSTREAM_CONF}"
              ;;
            green)
              TARGET_BACKEND_ACCESS_HOST="${GREEN_BACKEND_ACCESS_HOST:-}"
              TARGET_BACKEND_SERVER_HOST="${GREEN_BACKEND_SERVER_HOST:-}"
              TARGET_BACKEND_SERVER_SSH_KEY="${GREEN_BACKEND_SERVER_SSH_KEY:-}"
              TARGET_UPSTREAM_CONF="${GREEN_UPSTREAM_CONF}"
              ;;
            *)
              echo "Unsupported target slot: ${TARGET_SLOT}"
              exit 1
              ;;
          esac

          if [ -z "${TARGET_BACKEND_SERVER_HOST}" ]; then
            echo "Target slot ${TARGET_SLOT} is missing *_BACKEND_SERVER_HOST."
            exit 1
          fi
          if [ -z "${TARGET_BACKEND_SERVER_SSH_KEY}" ]; then
            echo "Target slot ${TARGET_SLOT} is missing *_BACKEND_SERVER_SSH_KEY."
            exit 1
          fi

          case "${LIVE_SLOT}" in
            blue)
              PREVIOUS_UPSTREAM_CONF="${BLUE_UPSTREAM_CONF}"
              ;;
            green)
              PREVIOUS_UPSTREAM_CONF="${GREEN_UPSTREAM_CONF}"
              ;;
            *)
              echo "Unsupported live slot: ${LIVE_SLOT}"
              exit 1
              ;;
          esac

          echo "traffic_switch_access_host=${ROUTER_ACCESS_HOST}" >> "$GITHUB_OUTPUT"
          echo "traffic_switch_server_host=${ROUTER_SERVER_HOST}" >> "$GITHUB_OUTPUT"
          echo "traffic_switch_public_health_url=${PUBLIC_HEALTH_URL}" >> "$GITHUB_OUTPUT"
          echo "traffic_switch_active_upstream_link=${ACTIVE_UPSTREAM_LINK}" >> "$GITHUB_OUTPUT"
          echo "traffic_switch_target_upstream_conf=${TARGET_UPSTREAM_CONF}" >> "$GITHUB_OUTPUT"
          echo "traffic_switch_previous_upstream_conf=${PREVIOUS_UPSTREAM_CONF}" >> "$GITHUB_OUTPUT"
          echo "target_backend_access_host=${TARGET_BACKEND_ACCESS_HOST}" >> "$GITHUB_OUTPUT"
          echo "target_backend_server_host=${TARGET_BACKEND_SERVER_HOST}" >> "$GITHUB_OUTPUT"
          echo "target_slot=${TARGET_SLOT}" >> "$GITHUB_OUTPUT"
          echo "live_slot=${LIVE_SLOT}" >> "$GITHUB_OUTPUT"
          {
            echo "traffic_switch_ssh_key<<__ROUTER_SSHKEY__"
            printf '%s\n' "${ROUTER_SSH_KEY}"
            echo "__ROUTER_SSHKEY__"
          } >> "$GITHUB_OUTPUT"
          {
            echo "target_backend_ssh_key<<__TARGET_BACKEND_SSHKEY__"
            printf '%s\n' "${TARGET_BACKEND_SERVER_SSH_KEY}"
            echo "__TARGET_BACKEND_SSHKEY__"
          } >> "$GITHUB_OUTPUT"

      - name: Install cloudflared client on runner
        env:
          TARGET_BACKEND_ACCESS_HOST: ${{ steps.traffic_switch_config.outputs.target_backend_access_host }}
          TRAFFIC_SWITCH_ACCESS_HOST: ${{ steps.traffic_switch_config.outputs.traffic_switch_access_host }}
        run: |
          set -euo pipefail
          if [ -z "${TRAFFIC_SWITCH_ACCESS_HOST:-}" ] && [ -z "${TARGET_BACKEND_ACCESS_HOST:-}" ]; then
            echo "No Cloudflare Access hosts configured. Skipping cloudflared installation."
            exit 0
          fi
          sudo curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Configure SSH connection
        id: traffic_switch_ssh
        env:
          TRAFFIC_SWITCH_ACCESS_HOST: ${{ steps.traffic_switch_config.outputs.traffic_switch_access_host }}
          TRAFFIC_SWITCH_SERVER_HOST: ${{ steps.traffic_switch_config.outputs.traffic_switch_server_host }}
          BACKEND_SERVER_USER: ${{ secrets.BACKEND_SERVER_USER }}
          TRAFFIC_SWITCH_SSH_KEY: ${{ steps.traffic_switch_config.outputs.traffic_switch_ssh_key }}
          TARGET_BACKEND_ACCESS_HOST: ${{ steps.traffic_switch_config.outputs.target_backend_access_host }}
          TARGET_BACKEND_SERVER_HOST: ${{ steps.traffic_switch_config.outputs.target_backend_server_host }}
          TARGET_BACKEND_SSH_KEY: ${{ steps.traffic_switch_config.outputs.target_backend_ssh_key }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          cat > ~/.ssh/traffic_switch_key <<'KEY_EOF'
          ${{ steps.traffic_switch_config.outputs.traffic_switch_ssh_key }}
          KEY_EOF
          chmod 600 ~/.ssh/traffic_switch_key

          cat > ~/.ssh/target_backend_key <<'KEY_EOF'
          ${{ steps.traffic_switch_config.outputs.target_backend_ssh_key }}
          KEY_EOF
          chmod 600 ~/.ssh/target_backend_key

          if [ -n "${TRAFFIC_SWITCH_ACCESS_HOST:-}" ]; then
            cat > ~/.ssh/config <<EOF
          Host traffic-switch-target
            HostName ${TRAFFIC_SWITCH_ACCESS_HOST}
            User ${BACKEND_SERVER_USER}
            Port 22
            IdentityFile ~/.ssh/traffic_switch_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ServerAliveInterval 30
            ProxyCommand cloudflared access ssh --hostname %h --id ${CF_ACCESS_CLIENT_ID} --secret ${CF_ACCESS_CLIENT_SECRET}
          EOF
            echo "Configured Cloudflare Access SSH for traffic switch host ${TRAFFIC_SWITCH_ACCESS_HOST}"
          else
            cat > ~/.ssh/config <<EOF
          Host traffic-switch-target
            HostName ${TRAFFIC_SWITCH_SERVER_HOST}
            User ${BACKEND_SERVER_USER}
            Port 22
            IdentityFile ~/.ssh/traffic_switch_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ServerAliveInterval 30
          EOF
            echo "Configured direct SSH for traffic switch host ${TRAFFIC_SWITCH_SERVER_HOST}"
          fi

          if [ -n "${TARGET_BACKEND_ACCESS_HOST:-}" ]; then
            cat >> ~/.ssh/config <<EOF

          Host target-backend
            HostName ${TARGET_BACKEND_ACCESS_HOST}
            User ${BACKEND_SERVER_USER}
            Port 22
            IdentityFile ~/.ssh/target_backend_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ServerAliveInterval 30
            ProxyCommand cloudflared access ssh --hostname %h --id ${CF_ACCESS_CLIENT_ID} --secret ${CF_ACCESS_CLIENT_SECRET}
          EOF
            echo "Configured Cloudflare Access SSH for target backend ${TARGET_BACKEND_ACCESS_HOST}"
          else
            cat >> ~/.ssh/config <<EOF

          Host target-backend
            HostName ${TARGET_BACKEND_SERVER_HOST}
            User ${BACKEND_SERVER_USER}
            Port 22
            IdentityFile ~/.ssh/target_backend_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ServerAliveInterval 30
          EOF
            echo "Configured direct SSH for target backend ${TARGET_BACKEND_SERVER_HOST}"
          fi

          chmod 600 ~/.ssh/config
          echo "traffic_switch_host=traffic-switch-target" >> "$GITHUB_OUTPUT"
          echo "target_backend_host=target-backend" >> "$GITHUB_OUTPUT"
          ssh -o BatchMode=yes -o ConnectTimeout=10 traffic-switch-target "echo ssh_ok"
          ssh -o BatchMode=yes -o ConnectTimeout=10 target-backend "echo ssh_ok"

      - name: Verify target slot still matches this deployment
        env:
          BACKEND_APP_DIR: ${{ secrets.BACKEND_APP_DIR }}
          EXPECTED_RUN_ID: ${{ github.run_id }}
          EXPECTED_TARGET_SLOT: ${{ steps.traffic_switch_config.outputs.target_slot }}
          TARGET_BACKEND_SSH_HOST: ${{ steps.traffic_switch_ssh.outputs.target_backend_host }}
        run: |
          set -euo pipefail
          printf -v APP_DIR_Q '%q' "${BACKEND_APP_DIR}"
          printf -v EXPECTED_RUN_ID_Q '%q' "${EXPECTED_RUN_ID}"
          printf -v EXPECTED_TARGET_SLOT_Q '%q' "${EXPECTED_TARGET_SLOT}"

          ssh "${TARGET_BACKEND_SSH_HOST}" \
            "BACKEND_APP_DIR=${APP_DIR_Q} EXPECTED_RUN_ID=${EXPECTED_RUN_ID_Q} EXPECTED_TARGET_SLOT=${EXPECTED_TARGET_SLOT_Q} bash -s" <<'REMOTE_EOF'
            set -euo pipefail

            DEPLOY_METADATA_PATH="${BACKEND_APP_DIR}/deploy-metadata.env"
            if [ ! -f "${DEPLOY_METADATA_PATH}" ]; then
              echo "Missing deploy metadata: ${DEPLOY_METADATA_PATH}"
              exit 1
            fi

            # shellcheck disable=SC1090
            source "${DEPLOY_METADATA_PATH}"

            if [ "${DEPLOY_RUN_ID:-}" != "${EXPECTED_RUN_ID}" ]; then
              echo "Target slot was superseded by another deployment. expected=${EXPECTED_RUN_ID} actual=${DEPLOY_RUN_ID:-missing}"
              exit 1
            fi
            if [ "${TARGET_SLOT:-}" != "${EXPECTED_TARGET_SLOT}" ]; then
              echo "Target slot metadata mismatch. expected=${EXPECTED_TARGET_SLOT} actual=${TARGET_SLOT:-missing}"
              exit 1
            fi

            echo "Target slot deployment marker matches current run."
          REMOTE_EOF

      - name: Switch production traffic to deployed slot
        env:
          TARGET_SLOT: ${{ steps.traffic_switch_config.outputs.target_slot }}
          LIVE_SLOT: ${{ steps.traffic_switch_config.outputs.live_slot }}
          PUBLIC_HEALTH_URL: ${{ steps.traffic_switch_config.outputs.traffic_switch_public_health_url }}
          ACTIVE_UPSTREAM_LINK: ${{ steps.traffic_switch_config.outputs.traffic_switch_active_upstream_link }}
          TARGET_UPSTREAM_CONF: ${{ steps.traffic_switch_config.outputs.traffic_switch_target_upstream_conf }}
          PREVIOUS_UPSTREAM_CONF: ${{ steps.traffic_switch_config.outputs.traffic_switch_previous_upstream_conf }}
          TRAFFIC_SWITCH_SSH_HOST: ${{ steps.traffic_switch_ssh.outputs.traffic_switch_host }}
        run: |
          set -euo pipefail

          printf -v TARGET_SLOT_Q '%q' "${TARGET_SLOT}"
          printf -v LIVE_SLOT_Q '%q' "${LIVE_SLOT}"
          printf -v PUBLIC_HEALTH_URL_Q '%q' "${PUBLIC_HEALTH_URL}"
          printf -v ACTIVE_UPSTREAM_LINK_Q '%q' "${ACTIVE_UPSTREAM_LINK}"
          printf -v TARGET_UPSTREAM_CONF_Q '%q' "${TARGET_UPSTREAM_CONF}"
          printf -v PREVIOUS_UPSTREAM_CONF_Q '%q' "${PREVIOUS_UPSTREAM_CONF}"

          ssh "${TRAFFIC_SWITCH_SSH_HOST}" \
            "TARGET_SLOT=${TARGET_SLOT_Q} LIVE_SLOT=${LIVE_SLOT_Q} PUBLIC_HEALTH_URL=${PUBLIC_HEALTH_URL_Q} ACTIVE_UPSTREAM_LINK=${ACTIVE_UPSTREAM_LINK_Q} TARGET_UPSTREAM_CONF=${TARGET_UPSTREAM_CONF_Q} PREVIOUS_UPSTREAM_CONF=${PREVIOUS_UPSTREAM_CONF_Q} bash -s" <<'REMOTE_EOF'
            set -euo pipefail

            collect_nginx_diagnostics() {
              echo "Collecting nginx diagnostics..."
              sudo nginx -t || true
              sudo systemctl status nginx --no-pager -l || true
              sudo journalctl -u nginx -n 200 --no-pager || true
            }

            verify_public_health() {
              for i in {1..12}; do
                if curl -fsS "${PUBLIC_HEALTH_URL}" >/dev/null; then
                  echo "Public health check succeeded on attempt ${i}"
                  return 0
                fi
                echo "Public health check failed on attempt ${i}, retrying in 5s..."
                sleep 5
              done
              echo "Public health check failed after retries."
              return 1
            }

            rollback_traffic() {
              echo "Rolling back Nginx upstream from ${TARGET_SLOT} to ${LIVE_SLOT}"
              sudo ln -sfn "${PREVIOUS_UPSTREAM_CONF}" "${ACTIVE_UPSTREAM_LINK}"
              sudo nginx -t
              sudo systemctl reload nginx
            }

            sudo test -f "${TARGET_UPSTREAM_CONF}"
            sudo test -f "${PREVIOUS_UPSTREAM_CONF}"

            echo "Switching production traffic from ${LIVE_SLOT} to ${TARGET_SLOT}"
            echo "Target upstream: ${TARGET_UPSTREAM_CONF}"
            echo "Active link: ${ACTIVE_UPSTREAM_LINK}"

            sudo ln -sfn "${TARGET_UPSTREAM_CONF}" "${ACTIVE_UPSTREAM_LINK}"
            if ! sudo nginx -t; then
              echo "Nginx config test failed after switching upstream."
              collect_nginx_diagnostics
              rollback_traffic
              exit 1
            fi

            if ! sudo systemctl reload nginx; then
              echo "Nginx reload failed after switching upstream."
              collect_nginx_diagnostics
              rollback_traffic
              exit 1
            fi

            if verify_public_health; then
              echo "Production traffic now points to ${TARGET_SLOT}"
              sudo readlink -f "${ACTIVE_UPSTREAM_LINK}" || true
              exit 0
            fi

            echo "Public health failed after traffic switch."
            collect_nginx_diagnostics
            rollback_traffic
            if verify_public_health; then
              echo "Traffic rollback to ${LIVE_SLOT} succeeded."
            else
              echo "Traffic rollback to ${LIVE_SLOT} failed health verification."
              collect_nginx_diagnostics
            fi
            exit 1
          REMOTE_EOF


