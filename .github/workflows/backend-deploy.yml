name: Deploy Backend
# Flyway repair step runs on DB server via DB_SERVER_* production secrets.

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build Boot Jar
        working-directory: ./backend
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew clean bootJar -x test --no-daemon

      - name: Prepare artifact
        run: |
          set -euo pipefail
          JAR_PATH=$(ls backend/build/libs/*.jar | grep -v '\-plain\.jar$' | head -n 1 || true)
          if [ -z "${JAR_PATH}" ]; then
            echo "No boot jar found in backend/build/libs"
            exit 1
          fi
          cp "${JAR_PATH}" app.jar

      - name: Validate required environment secrets
        env:
          BACKEND_SERVER_HOST: ${{ secrets.BACKEND_SERVER_HOST }}
          BACKEND_SERVER_USER: ${{ secrets.BACKEND_SERVER_USER }}
          BACKEND_SERVER_SSH_KEY: ${{ secrets.BACKEND_SERVER_SSH_KEY }}
          DB_SERVER_HOST: ${{ secrets.DB_SERVER_HOST }}
          DB_SERVER_USER: ${{ secrets.DB_SERVER_USER }}
          DB_SERVER_SSH_KEY: ${{ secrets.DB_SERVER_SSH_KEY }}
          BACKEND_APP_DIR: ${{ secrets.BACKEND_APP_DIR }}
          SPRING_DB_URL: ${{ secrets.SPRING_DB_URL }}
          SPRING_DB_USERNAME: ${{ secrets.SPRING_DB_USERNAME }}
          SPRING_DB_PASSWORD: ${{ secrets.SPRING_DB_PASSWORD }}
          SPRING_DB_DRIVER_CLASS_NAME: ${{ secrets.SPRING_DB_DRIVER_CLASS_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ACCESS_EXPIRATION: ${{ secrets.JWT_ACCESS_EXPIRATION }}
          AI_SERVER_BASE_URL: ${{ secrets.AI_SERVER_BASE_URL }}
          BACKEND_HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}
          RABBITMQ_EXCHANGE: ${{ secrets.RABBITMQ_EXCHANGE }}
          RABBITMQ_QUEUE_REPORT: ${{ secrets.RABBITMQ_QUEUE_REPORT }}
          RABBITMQ_QUEUE_DLQ: ${{ secrets.RABBITMQ_QUEUE_DLQ }}
          STORAGE_API_AUTH_ENABLED: ${{ secrets.STORAGE_API_AUTH_ENABLED }}
          STORAGE_API_KEY_VALUE: ${{ secrets.STORAGE_API_KEY_VALUE }}
          STORAGE_API_GLOBAL_ACCESS: ${{ secrets.STORAGE_API_GLOBAL_ACCESS }}
          STORAGE_API_KEY_ACTIVE: ${{ secrets.STORAGE_API_KEY_ACTIVE }}
          STORAGE_PROVIDER: ${{ secrets.STORAGE_PROVIDER }}
          STORAGE_LOCAL_BASE_DIR: ${{ secrets.STORAGE_LOCAL_BASE_DIR }}
          STORAGE_MAX_DOCUMENT_SIZE_MB: ${{ secrets.STORAGE_MAX_DOCUMENT_SIZE_MB }}
          STORAGE_MAX_IMAGE_SIZE_MB: ${{ secrets.STORAGE_MAX_IMAGE_SIZE_MB }}
          STORAGE_DOWNLOAD_URL_TTL_SECONDS: ${{ secrets.STORAGE_DOWNLOAD_URL_TTL_SECONDS }}
          STORAGE_RETRY_ENABLED: ${{ secrets.STORAGE_RETRY_ENABLED }}
          STORAGE_RETRY_MAX_ATTEMPTS: ${{ secrets.STORAGE_RETRY_MAX_ATTEMPTS }}
          STORAGE_RETRY_INTERVAL_MS: ${{ secrets.STORAGE_RETRY_INTERVAL_MS }}
          STORAGE_RETRY_BASE_BACKOFF_SECONDS: ${{ secrets.STORAGE_RETRY_BASE_BACKOFF_SECONDS }}
          STORAGE_RETRY_MAX_BACKOFF_SECONDS: ${{ secrets.STORAGE_RETRY_MAX_BACKOFF_SECONDS }}
          STORAGE_RETRY_BATCH_SIZE: ${{ secrets.STORAGE_RETRY_BATCH_SIZE }}
          STORAGE_OCI_CLI_EXECUTABLE: ${{ secrets.STORAGE_OCI_CLI_EXECUTABLE }}
          STORAGE_OCI_PRIMARY_PROFILE: ${{ secrets.STORAGE_OCI_PRIMARY_PROFILE }}
          STORAGE_OCI_BACKUP_PROFILE: ${{ secrets.STORAGE_OCI_BACKUP_PROFILE }}
          STORAGE_OCI_SUPPRESS_PERMISSIONS_WARNING: ${{ secrets.STORAGE_OCI_SUPPRESS_PERMISSIONS_WARNING }}
          STORAGE_PRIMARY_NAMESPACE: ${{ secrets.STORAGE_PRIMARY_NAMESPACE }}
          STORAGE_PRIMARY_BUCKET: ${{ secrets.STORAGE_PRIMARY_BUCKET }}
          STORAGE_BACKUP_NAMESPACE: ${{ secrets.STORAGE_BACKUP_NAMESPACE }}
          STORAGE_BACKUP_BUCKET: ${{ secrets.STORAGE_BACKUP_BUCKET }}
        run: |
          set -euo pipefail
          required_vars=(
            BACKEND_SERVER_HOST
            BACKEND_SERVER_USER
            BACKEND_SERVER_SSH_KEY
            DB_SERVER_HOST
            BACKEND_APP_DIR
            SPRING_DB_URL
            SPRING_DB_USERNAME
            SPRING_DB_PASSWORD
            SPRING_DB_DRIVER_CLASS_NAME
            JWT_SECRET
            JWT_ACCESS_EXPIRATION
            AI_SERVER_BASE_URL
            BACKEND_HEALTH_URL
            REDIS_URL
            RABBITMQ_URL
            RABBITMQ_EXCHANGE
            RABBITMQ_QUEUE_REPORT
            RABBITMQ_QUEUE_DLQ
            STORAGE_API_AUTH_ENABLED
            STORAGE_API_KEY_VALUE
            STORAGE_API_GLOBAL_ACCESS
            STORAGE_API_KEY_ACTIVE
            STORAGE_PROVIDER
            STORAGE_LOCAL_BASE_DIR
            STORAGE_MAX_DOCUMENT_SIZE_MB
            STORAGE_MAX_IMAGE_SIZE_MB
            STORAGE_DOWNLOAD_URL_TTL_SECONDS
            STORAGE_RETRY_ENABLED
            STORAGE_RETRY_MAX_ATTEMPTS
            STORAGE_RETRY_INTERVAL_MS
            STORAGE_RETRY_BASE_BACKOFF_SECONDS
            STORAGE_RETRY_MAX_BACKOFF_SECONDS
            STORAGE_RETRY_BATCH_SIZE
            STORAGE_OCI_CLI_EXECUTABLE
            STORAGE_OCI_PRIMARY_PROFILE
            STORAGE_OCI_BACKUP_PROFILE
            STORAGE_OCI_SUPPRESS_PERMISSIONS_WARNING
            STORAGE_PRIMARY_NAMESPACE
            STORAGE_PRIMARY_BUCKET
            STORAGE_BACKUP_NAMESPACE
            STORAGE_BACKUP_BUCKET
          )
          missing_vars=()
          for v in "${required_vars[@]}"; do
            if [ -z "${!v:-}" ]; then
              missing_vars+=("$v")
            fi
          done
          if [ "${#missing_vars[@]}" -gt 0 ]; then
            echo "Missing required secrets: ${missing_vars[*]}"
            exit 1
          fi

      - name: Upload app.jar to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.BACKEND_SERVER_HOST }}
          username: ${{ secrets.BACKEND_SERVER_USER }}
          key: ${{ secrets.BACKEND_SERVER_SSH_KEY }}
          source: "app.jar"
          target: ${{ secrets.BACKEND_APP_DIR }}
          overwrite: true

      - name: Repair Flyway failed migrations
        uses: appleboy/ssh-action@v1.2.0
        env:
          SPRING_DB_URL: ${{ secrets.SPRING_DB_URL }}
          SPRING_DB_USERNAME: ${{ secrets.SPRING_DB_USERNAME }}
          SPRING_DB_PASSWORD: ${{ secrets.SPRING_DB_PASSWORD }}
        with:
          host: ${{ secrets.DB_SERVER_HOST }}
          username: ${{ secrets.DB_SERVER_USER != '' && secrets.DB_SERVER_USER || secrets.BACKEND_SERVER_USER }}
          key: ${{ secrets.DB_SERVER_SSH_KEY != '' && secrets.DB_SERVER_SSH_KEY || secrets.BACKEND_SERVER_SSH_KEY }}
          proxy_host: ${{ secrets.DB_SERVER_HOST != '' && secrets.DB_SERVER_HOST != secrets.BACKEND_SERVER_HOST && secrets.BACKEND_SERVER_HOST || '' }}
          proxy_username: ${{ secrets.DB_SERVER_HOST != '' && secrets.DB_SERVER_HOST != secrets.BACKEND_SERVER_HOST && secrets.BACKEND_SERVER_USER || '' }}
          proxy_key: ${{ secrets.DB_SERVER_HOST != '' && secrets.DB_SERVER_HOST != secrets.BACKEND_SERVER_HOST && secrets.BACKEND_SERVER_SSH_KEY || '' }}
          debug: true
          envs: SPRING_DB_URL,SPRING_DB_USERNAME,SPRING_DB_PASSWORD
          script: |
            set -euo pipefail

            # Parse JDBC URL: jdbc:mysql://host:port/dbname?params
            DB_RAW="${SPRING_DB_URL#jdbc:mysql://}"
            DB_RAW="${DB_RAW%%\?*}"
            DB_HOSTPORT="${DB_RAW%%/*}"
            DB_NAME="${DB_RAW#*/}"
            DB_HOST="${DB_HOSTPORT%%:*}"
            DB_PORT="${DB_HOSTPORT##*:}"
            if [ "${DB_HOST}" = "${DB_PORT}" ] || [ -z "${DB_PORT}" ]; then
              DB_PORT="3306"
            fi
            if [ -z "${DB_HOST// }" ] || [ -z "${DB_NAME// }" ]; then
              echo "ERROR: Unable to parse SPRING_DB_URL for Flyway repair step."
              exit 1
            fi
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:${PATH:-}"
            echo "Repair host: $(hostname) user=$(whoami) uid=$(id -u)"
            echo "PATH=${PATH}"

            find_mysql_bin() {
              MYSQL_BIN="$(command -v mysql || true)"
              if [ -z "${MYSQL_BIN}" ]; then
                for c in /usr/bin/mysql /usr/local/bin/mysql /usr/local/mysql/bin/mysql /bin/mysql; do
                  if [ -x "${c}" ]; then
                    MYSQL_BIN="${c}"
                    break
                  fi
                done
              fi
              [ -n "${MYSQL_BIN}" ]
            }

            mysql8_ready() {
              if ! find_mysql_bin; then
                return 1
              fi
              MYSQL_VERSION_RAW="$("${MYSQL_BIN}" --version 2>/dev/null || true)"
              if echo "${MYSQL_VERSION_RAW}" | grep -Eiq 'mariadb'; then
                return 1
              fi
              MYSQL_VERSION_SEMVER="$(echo "${MYSQL_VERSION_RAW}" | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)"
              MYSQL_MAJOR="${MYSQL_VERSION_SEMVER%%.*}"
              [ -n "${MYSQL_MAJOR}" ] && [ "${MYSQL_MAJOR}" -ge 8 ]
            }

            run_with_priv() {
              if [ "$(id -u)" -eq 0 ]; then
                "$@"
                return $?
              fi
              if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
                sudo "$@"
                return $?
              fi
              return 1
            }

            if ! mysql8_ready; then
              echo "WARN: MySQL 8.0+ client not found on backend host. Attempting installation..."
              echo "Package manager probe: apt-get=$(command -v apt-get || echo '<none>') dnf=$(command -v dnf || echo '<none>') yum=$(command -v yum || echo '<none>')"
              if command -v apt-get >/dev/null 2>&1; then
                run_with_priv apt-get update -y || true
                run_with_priv env DEBIAN_FRONTEND=noninteractive apt-get install -y mysql-client-8.0 || true
                run_with_priv env DEBIAN_FRONTEND=noninteractive apt-get install -y mysql-client-core-8.0 || true
              elif command -v dnf >/dev/null 2>&1; then
                run_with_priv dnf install -y mysql-community-client || true
              elif command -v yum >/dev/null 2>&1; then
                run_with_priv yum install -y mysql-community-client || true
              else
                echo "WARN: No supported package manager detected for mysql client installation."
              fi
              if find_mysql_bin; then
                echo "Post-install mysql binary: ${MYSQL_BIN}"
              fi
            fi

            if ! mysql8_ready; then
              echo "ERROR: MySQL 8.0+ client is required for Flyway repair step."
              if find_mysql_bin; then
                echo "       mysql binary: ${MYSQL_BIN}"
                echo "       mysql --version: $("${MYSQL_BIN}" --version 2>/dev/null || true)"
              else
                echo "       mysql binary: <not found in PATH or common locations>"
              fi
              echo "       Ensure 'mysql --version' reports MySQL 8.x (not MariaDB) on backend host."
              exit 1
            fi

            echo "Using DB client (${MYSQL_BIN}): $("${MYSQL_BIN}" --version)"

            mysql_scalar() {
              local sql="$1"
              "${MYSQL_BIN}" -h "${DB_HOST}" -P "${DB_PORT}" \
                -u "${SPRING_DB_USERNAME}" -p"${SPRING_DB_PASSWORD}" \
                --skip-column-names --silent \
                "${DB_NAME}" \
                -e "${sql}"
            }

            HAS_HISTORY=$(mysql_scalar "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='${DB_NAME}' AND table_name='flyway_schema_history';")
            if [ "${HAS_HISTORY}" -eq 0 ]; then
              echo "No flyway_schema_history table found. Skipping repair."
              exit 0
            fi

            FAILED_ANY=$(mysql_scalar "SELECT COUNT(*) FROM flyway_schema_history WHERE success=0;")
            if [ "${FAILED_ANY}" -eq 0 ]; then
              echo "No failed migrations found. Skipping repair."
              exit 0
            fi

            FAILED_V7=$(mysql_scalar "SELECT COUNT(*) FROM flyway_schema_history WHERE success=0 AND version='7';")
            FAILED_V8=$(mysql_scalar "SELECT COUNT(*) FROM flyway_schema_history WHERE success=0 AND version='8';")
            FAILED_OTHER=$(mysql_scalar "SELECT COUNT(*) FROM flyway_schema_history WHERE success=0 AND (version IS NULL OR version NOT IN ('7','8'));")

            if [ "${FAILED_OTHER}" -gt 0 ]; then
              FAILED_VERSIONS=$(mysql_scalar "SELECT IFNULL(GROUP_CONCAT(COALESCE(version,'<null>') ORDER BY installed_rank SEPARATOR ','), '') FROM flyway_schema_history WHERE success=0;")
              echo "ERROR: Found unsupported failed migration versions: ${FAILED_VERSIONS}"
              echo "This auto-repair step handles only V7/V8 document storage migrations."
              exit 1
            fi

            if [ "${FAILED_V7}" -gt 0 ]; then
              SUCCESS_V7=$(mysql_scalar "SELECT COUNT(*) FROM flyway_schema_history WHERE success=1 AND version='7';")
              if [ "${SUCCESS_V7}" -gt 0 ]; then
                echo "ERROR: V7 has both success and failure records. Manual intervention required."
                exit 1
              fi

              echo "Repairing failed V7 migration: drop document tables and clear failed V7/V8 rows."
              mysql_scalar "SET FOREIGN_KEY_CHECKS=0; DROP TABLE IF EXISTS document_backup_jobs; DROP TABLE IF EXISTS document_files; SET FOREIGN_KEY_CHECKS=1; DELETE FROM flyway_schema_history WHERE success=0 AND version IN ('7','8');"
              echo "V7 repair completed."
              exit 0
            fi

            if [ "${FAILED_V8}" -gt 0 ]; then
              echo "Repairing failed V8 migration: drop backup job table and clear failed V8 rows."
              mysql_scalar "SET FOREIGN_KEY_CHECKS=0; DROP TABLE IF EXISTS document_backup_jobs; SET FOREIGN_KEY_CHECKS=1; DELETE FROM flyway_schema_history WHERE success=0 AND version='8';"
              echo "V8 repair completed."
              exit 0
            fi

            echo "No eligible failed migration versions found for auto-repair."
            exit 0

      - name: Restart backend
        uses: appleboy/ssh-action@v1.2.0
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ACCESS_EXPIRATION: ${{ secrets.JWT_ACCESS_EXPIRATION }}
          AI_SERVER_BASE_URL: ${{ secrets.AI_SERVER_BASE_URL }}
          SPRING_DB_URL: ${{ secrets.SPRING_DB_URL }}
          SPRING_DB_USERNAME: ${{ secrets.SPRING_DB_USERNAME }}
          SPRING_DB_PASSWORD: ${{ secrets.SPRING_DB_PASSWORD }}
          SPRING_DB_DRIVER_CLASS_NAME: ${{ secrets.SPRING_DB_DRIVER_CLASS_NAME }}
          SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${{ secrets.SPRING_FLYWAY_BASELINE_ON_MIGRATE }}
          SPRING_FLYWAY_BASELINE_VERSION: ${{ secrets.SPRING_FLYWAY_BASELINE_VERSION }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}
          RABBITMQ_EXCHANGE: ${{ secrets.RABBITMQ_EXCHANGE }}
          RABBITMQ_QUEUE_REPORT: ${{ secrets.RABBITMQ_QUEUE_REPORT }}
          RABBITMQ_QUEUE_DLQ: ${{ secrets.RABBITMQ_QUEUE_DLQ }}
          STORAGE_API_AUTH_ENABLED: ${{ secrets.STORAGE_API_AUTH_ENABLED }}
          STORAGE_API_KEY_ID: ${{ secrets.STORAGE_API_KEY_ID }}
          STORAGE_API_KEY_VALUE: ${{ secrets.STORAGE_API_KEY_VALUE }}
          STORAGE_API_GLOBAL_ACCESS: ${{ secrets.STORAGE_API_GLOBAL_ACCESS }}
          STORAGE_API_KEY_ACTIVE: ${{ secrets.STORAGE_API_KEY_ACTIVE }}
          STORAGE_PROVIDER: ${{ secrets.STORAGE_PROVIDER }}
          STORAGE_LOCAL_BASE_DIR: ${{ secrets.STORAGE_LOCAL_BASE_DIR }}
          STORAGE_MAX_DOCUMENT_SIZE_MB: ${{ secrets.STORAGE_MAX_DOCUMENT_SIZE_MB }}
          STORAGE_MAX_IMAGE_SIZE_MB: ${{ secrets.STORAGE_MAX_IMAGE_SIZE_MB }}
          STORAGE_DOWNLOAD_URL_TTL_SECONDS: ${{ secrets.STORAGE_DOWNLOAD_URL_TTL_SECONDS }}
          STORAGE_RETRY_ENABLED: ${{ secrets.STORAGE_RETRY_ENABLED }}
          STORAGE_RETRY_MAX_ATTEMPTS: ${{ secrets.STORAGE_RETRY_MAX_ATTEMPTS }}
          STORAGE_RETRY_INTERVAL_MS: ${{ secrets.STORAGE_RETRY_INTERVAL_MS }}
          STORAGE_RETRY_BASE_BACKOFF_SECONDS: ${{ secrets.STORAGE_RETRY_BASE_BACKOFF_SECONDS }}
          STORAGE_RETRY_MAX_BACKOFF_SECONDS: ${{ secrets.STORAGE_RETRY_MAX_BACKOFF_SECONDS }}
          STORAGE_RETRY_BATCH_SIZE: ${{ secrets.STORAGE_RETRY_BATCH_SIZE }}
          STORAGE_OCI_CLI_EXECUTABLE: ${{ secrets.STORAGE_OCI_CLI_EXECUTABLE }}
          STORAGE_OCI_PRIMARY_PROFILE: ${{ secrets.STORAGE_OCI_PRIMARY_PROFILE }}
          STORAGE_OCI_BACKUP_PROFILE: ${{ secrets.STORAGE_OCI_BACKUP_PROFILE }}
          STORAGE_OCI_SUPPRESS_PERMISSIONS_WARNING: ${{ secrets.STORAGE_OCI_SUPPRESS_PERMISSIONS_WARNING }}
          STORAGE_PRIMARY_NAMESPACE: ${{ secrets.STORAGE_PRIMARY_NAMESPACE }}
          STORAGE_PRIMARY_BUCKET: ${{ secrets.STORAGE_PRIMARY_BUCKET }}
          STORAGE_BACKUP_NAMESPACE: ${{ secrets.STORAGE_BACKUP_NAMESPACE }}
          STORAGE_BACKUP_BUCKET: ${{ secrets.STORAGE_BACKUP_BUCKET }}
          BACKEND_HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
          BACKEND_APP_DIR: ${{ secrets.BACKEND_APP_DIR }}
        with:
          host: ${{ secrets.BACKEND_SERVER_HOST }}
          username: ${{ secrets.BACKEND_SERVER_USER }}
          key: ${{ secrets.BACKEND_SERVER_SSH_KEY }}
          envs: DB_PASSWORD,JWT_SECRET,JWT_ACCESS_EXPIRATION,AI_SERVER_BASE_URL,SPRING_DB_URL,SPRING_DB_USERNAME,SPRING_DB_PASSWORD,SPRING_DB_DRIVER_CLASS_NAME,SPRING_FLYWAY_BASELINE_ON_MIGRATE,SPRING_FLYWAY_BASELINE_VERSION,REDIS_URL,RABBITMQ_URL,RABBITMQ_EXCHANGE,RABBITMQ_QUEUE_REPORT,RABBITMQ_QUEUE_DLQ,STORAGE_API_AUTH_ENABLED,STORAGE_API_KEY_ID,STORAGE_API_KEY_VALUE,STORAGE_API_GLOBAL_ACCESS,STORAGE_API_KEY_ACTIVE,STORAGE_PROVIDER,STORAGE_LOCAL_BASE_DIR,STORAGE_MAX_DOCUMENT_SIZE_MB,STORAGE_MAX_IMAGE_SIZE_MB,STORAGE_DOWNLOAD_URL_TTL_SECONDS,STORAGE_RETRY_ENABLED,STORAGE_RETRY_MAX_ATTEMPTS,STORAGE_RETRY_INTERVAL_MS,STORAGE_RETRY_BASE_BACKOFF_SECONDS,STORAGE_RETRY_MAX_BACKOFF_SECONDS,STORAGE_RETRY_BATCH_SIZE,STORAGE_OCI_CLI_EXECUTABLE,STORAGE_OCI_PRIMARY_PROFILE,STORAGE_OCI_BACKUP_PROFILE,STORAGE_OCI_SUPPRESS_PERMISSIONS_WARNING,STORAGE_PRIMARY_NAMESPACE,STORAGE_PRIMARY_BUCKET,STORAGE_BACKUP_NAMESPACE,STORAGE_BACKUP_BUCKET,BACKEND_HEALTH_URL,BACKEND_APP_DIR
          script: |
            set -euo pipefail

            APP_DIR="${BACKEND_APP_DIR}"
            JAR_PATH="${APP_DIR}/app.jar"
            ENV_PATH="/etc/withbuddy-backend.env"
            TMP_ENV_PATH="${APP_DIR}/backend.env.tmp"
            SERVICE_NAME="withbuddy-backend.service"
            HEALTH_URL="${BACKEND_HEALTH_URL:-http://127.0.0.1:8080/actuator/health/liveness}"
            FALLBACK_HEALTH_URL=""
            LOCAL_HEALTH_URL="http://127.0.0.1:8080/actuator/health/liveness"
            case "${HEALTH_URL}" in
              */actuator/health)
                FALLBACK_HEALTH_URL="${HEALTH_URL}/liveness"
                ;;
            esac

            mkdir -p "${APP_DIR}"
            test -f "${JAR_PATH}"

            EFFECTIVE_DB_URL="${SPRING_DB_URL:-}"
            EFFECTIVE_DB_USERNAME="${SPRING_DB_USERNAME:-}"
            EFFECTIVE_DB_PASSWORD="${SPRING_DB_PASSWORD:-${DB_PASSWORD:-}}"

            if [ -z "${EFFECTIVE_DB_URL// }" ]; then
              echo "ERROR: DB URL is empty. Check SPRING_DB_URL or SPRING_DATASOURCE_URL secret."
              exit 1
            fi
            if [ -z "${EFFECTIVE_DB_USERNAME// }" ]; then
              echo "ERROR: DB username is empty. Check SPRING_DB_USERNAME or SPRING_DATASOURCE_USERNAME secret."
              exit 1
            fi
            if [ -z "${EFFECTIVE_DB_PASSWORD// }" ]; then
              echo "ERROR: DB password is empty. Check SPRING_DB_PASSWORD or SPRING_DATASOURCE_PASSWORD/DB_PASSWORD secret."
              exit 1
            fi

            EFFECTIVE_REDIS_URL="${REDIS_URL:-}"
            EFFECTIVE_RABBITMQ_URL="${RABBITMQ_URL:-}"

            extract_host_port() {
              local url="$1"
              local default_port="$2"
              local without_scheme="${url#*://}"
              local without_auth="${without_scheme#*@}"
              local hostport="${without_auth%%/*}"
              local host="${hostport%%:*}"
              local port="${hostport##*:}"

              if [ -z "${host}" ]; then
                return 1
              fi
              if [ "${host}" = "${port}" ] || [ -z "${port}" ]; then
                port="${default_port}"
              fi
              echo "${host} ${port}"
            }

            can_connect_tcp() {
              local host="$1"
              local port="$2"
              timeout 2 bash -c "cat < /dev/null > /dev/tcp/${host}/${port}" >/dev/null 2>&1
            }

            wait_for_dependency() {
              local label="$1"
              local host="$2"
              local port="$3"
              for i in {1..12}; do
                if can_connect_tcp "${host}" "${port}"; then
                  echo "${label} reachable: ${host}:${port} (attempt ${i})"
                  return 0
                fi
                echo "${label} not reachable yet: ${host}:${port} (attempt ${i}/12), retrying in 5s..."
                sleep 5
              done
              echo "ERROR: ${label} unreachable: ${host}:${port}"
              return 1
            }

            read REDIS_HOST REDIS_PORT < <(extract_host_port "${EFFECTIVE_REDIS_URL}" "6379")
            read RABBITMQ_HOST RABBITMQ_PORT < <(extract_host_port "${EFFECTIVE_RABBITMQ_URL}" "5672")

            wait_for_dependency "Redis" "${REDIS_HOST}" "${REDIS_PORT}"
            wait_for_dependency "RabbitMQ" "${RABBITMQ_HOST}" "${RABBITMQ_PORT}"

            cat > "${TMP_ENV_PATH}" <<EOF
            DB_PASSWORD=${DB_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            JWT_ACCESS_EXPIRATION=${JWT_ACCESS_EXPIRATION}
            AI_SERVER_BASE_URL=${AI_SERVER_BASE_URL}
            SPRING_DB_URL=${EFFECTIVE_DB_URL}
            SPRING_DB_USERNAME=${EFFECTIVE_DB_USERNAME}
            SPRING_DB_PASSWORD=${EFFECTIVE_DB_PASSWORD}
            SPRING_DB_DRIVER_CLASS_NAME=${SPRING_DB_DRIVER_CLASS_NAME}
            SPRING_FLYWAY_BASELINE_ON_MIGRATE=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:-true}
            SPRING_FLYWAY_BASELINE_VERSION=${SPRING_FLYWAY_BASELINE_VERSION:-0}
            REDIS_URL=${EFFECTIVE_REDIS_URL}
            RABBITMQ_URL=${EFFECTIVE_RABBITMQ_URL}
            RABBITMQ_EXCHANGE=${RABBITMQ_EXCHANGE}
            RABBITMQ_QUEUE_REPORT=${RABBITMQ_QUEUE_REPORT}
            RABBITMQ_QUEUE_DLQ=${RABBITMQ_QUEUE_DLQ}
            STORAGE_API_AUTH_ENABLED=${STORAGE_API_AUTH_ENABLED}
            STORAGE_API_KEY_ID=${STORAGE_API_KEY_ID:-storage-admin}
            STORAGE_API_KEY_VALUE=${STORAGE_API_KEY_VALUE}
            STORAGE_API_GLOBAL_ACCESS=${STORAGE_API_GLOBAL_ACCESS}
            STORAGE_API_KEY_ACTIVE=${STORAGE_API_KEY_ACTIVE}
            STORAGE_PROVIDER=${STORAGE_PROVIDER}
            STORAGE_LOCAL_BASE_DIR=${STORAGE_LOCAL_BASE_DIR}
            STORAGE_MAX_DOCUMENT_SIZE_MB=${STORAGE_MAX_DOCUMENT_SIZE_MB}
            STORAGE_MAX_IMAGE_SIZE_MB=${STORAGE_MAX_IMAGE_SIZE_MB}
            STORAGE_DOWNLOAD_URL_TTL_SECONDS=${STORAGE_DOWNLOAD_URL_TTL_SECONDS}
            STORAGE_RETRY_ENABLED=${STORAGE_RETRY_ENABLED}
            STORAGE_RETRY_MAX_ATTEMPTS=${STORAGE_RETRY_MAX_ATTEMPTS}
            STORAGE_RETRY_INTERVAL_MS=${STORAGE_RETRY_INTERVAL_MS}
            STORAGE_RETRY_BASE_BACKOFF_SECONDS=${STORAGE_RETRY_BASE_BACKOFF_SECONDS}
            STORAGE_RETRY_MAX_BACKOFF_SECONDS=${STORAGE_RETRY_MAX_BACKOFF_SECONDS}
            STORAGE_RETRY_BATCH_SIZE=${STORAGE_RETRY_BATCH_SIZE}
            STORAGE_OCI_CLI_EXECUTABLE=${STORAGE_OCI_CLI_EXECUTABLE}
            STORAGE_OCI_PRIMARY_PROFILE=${STORAGE_OCI_PRIMARY_PROFILE}
            STORAGE_OCI_BACKUP_PROFILE=${STORAGE_OCI_BACKUP_PROFILE}
            STORAGE_OCI_SUPPRESS_PERMISSIONS_WARNING=${STORAGE_OCI_SUPPRESS_PERMISSIONS_WARNING}
            STORAGE_PRIMARY_NAMESPACE=${STORAGE_PRIMARY_NAMESPACE}
            STORAGE_PRIMARY_BUCKET=${STORAGE_PRIMARY_BUCKET}
            STORAGE_BACKUP_NAMESPACE=${STORAGE_BACKUP_NAMESPACE}
            STORAGE_BACKUP_BUCKET=${STORAGE_BACKUP_BUCKET}
            SPRING_PROFILES_ACTIVE=prod
            EOF
            chmod 600 "${TMP_ENV_PATH}"
            sudo install -m 600 "${TMP_ENV_PATH}" "${ENV_PATH}"
            rm -f "${TMP_ENV_PATH}"

            sudo systemctl restart "${SERVICE_NAME}"
            sudo systemctl is-active --quiet "${SERVICE_NAME}"

            collect_diagnostics() {
              echo "Collecting service diagnostics..."
              sudo systemctl status "${SERVICE_NAME}" --no-pager -l || true
              sudo journalctl -u "${SERVICE_NAME}" -n 300 --no-pager || true
            }

            print_flyway_recovery_hint_if_needed() {
              if sudo journalctl -u "${SERVICE_NAME}" -n 300 --no-pager | grep -Eiq "FlywayValidateException|Detected failed migration to version|Migrations have failed validation"; then
                echo "Detected Flyway validation failure in service logs."
                echo "Suggested recovery commands on backend host (verify in production DB before executing):"
                echo "1) Stop service"
                echo "   sudo systemctl stop \"${SERVICE_NAME}\""
                echo ""
                echo "2) Check Flyway history"
                echo "   SELECT installed_rank, version, description, success"
                echo "   FROM flyway_schema_history"
                echo "   WHERE version IN ('7','8','9','10')"
                echo "   ORDER BY installed_rank;"
                echo ""
                echo "3) If version 7 failed and document storage tables are safe to recreate"
                echo "   SET FOREIGN_KEY_CHECKS=0;"
                echo "   DROP TABLE IF EXISTS document_backup_jobs;"
                echo "   DROP TABLE IF EXISTS document_files;"
                echo "   SET FOREIGN_KEY_CHECKS=1;"
                echo "   DELETE FROM flyway_schema_history WHERE version='7' AND success=0;"
                echo ""
                echo "4) Start service again"
                echo "   sudo systemctl start \"${SERVICE_NAME}\""
              fi
            }

            for i in {1..12}; do
              if curl -fsS "${HEALTH_URL}"; then
                echo "Health check succeeded on attempt ${i}"
                exit 0
              fi
              if [ -n "${FALLBACK_HEALTH_URL}" ] && curl -fsS "${FALLBACK_HEALTH_URL}"; then
                echo "Health check succeeded on attempt ${i} (liveness fallback)"
                exit 0
              fi
              if [ "${LOCAL_HEALTH_URL}" != "${HEALTH_URL}" ] && [ "${LOCAL_HEALTH_URL}" != "${FALLBACK_HEALTH_URL}" ] && curl -fsS "${LOCAL_HEALTH_URL}"; then
                echo "Health check succeeded on attempt ${i} (local liveness fallback)"
                exit 0
              fi

              if ! sudo systemctl is-active --quiet "${SERVICE_NAME}"; then
                echo "Service became inactive while waiting for health check (attempt ${i})."
                collect_diagnostics
                print_flyway_recovery_hint_if_needed
                exit 1
              fi

              echo "Health check failed on attempt ${i}, retrying in 5s..."
              sleep 5
            done

            echo "Health check failed after retries. Collecting diagnostics..."
            collect_diagnostics
            print_flyway_recovery_hint_if_needed
            exit 1
