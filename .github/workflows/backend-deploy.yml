name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build Boot Jar
        working-directory: ./backend
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew clean bootJar -x test --no-daemon

      - name: Prepare artifact
        run: |
          set -euo pipefail
          JAR_PATH=$(ls backend/build/libs/*.jar | grep -v '\-plain\.jar$' | head -n 1 || true)
          if [ -z "${JAR_PATH}" ]; then
            echo "No boot jar found in backend/build/libs"
            exit 1
          fi
          cp "${JAR_PATH}" app.jar

      - name: Validate required environment secrets
        env:
          BACKEND_SERVER_HOST: ${{ secrets.BACKEND_SERVER_HOST }}
          BACKEND_SERVER_USER: ${{ secrets.BACKEND_SERVER_USER }}
          BACKEND_SERVER_SSH_KEY: ${{ secrets.BACKEND_SERVER_SSH_KEY }}
          BACKEND_APP_DIR: ${{ secrets.BACKEND_APP_DIR }}
          SPRING_DB_URL: ${{ secrets.SPRING_DB_URL }}
          SPRING_DB_USERNAME: ${{ secrets.SPRING_DB_USERNAME }}
          SPRING_DB_PASSWORD: ${{ secrets.SPRING_DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          BACKEND_HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}
        run: |
          set -euo pipefail
          required_vars=(
            BACKEND_SERVER_HOST
            BACKEND_SERVER_USER
            BACKEND_SERVER_SSH_KEY
            BACKEND_APP_DIR
            SPRING_DB_URL
            SPRING_DB_USERNAME
            SPRING_DB_PASSWORD
            JWT_SECRET
            BACKEND_HEALTH_URL
            REDIS_URL
            RABBITMQ_URL
          )
          for v in "${required_vars[@]}"; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required secret: $v"
              exit 1
            fi
          done

      - name: Upload app.jar to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.BACKEND_SERVER_HOST }}
          username: ${{ secrets.BACKEND_SERVER_USER }}
          key: ${{ secrets.BACKEND_SERVER_SSH_KEY }}
          source: "app.jar"
          target: ${{ secrets.BACKEND_APP_DIR }}
          overwrite: true

      - name: Restart backend
        uses: appleboy/ssh-action@v1.2.0
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AI_API_URL: ${{ secrets.AI_API_URL }}
          SPRING_DB_URL: ${{ secrets.SPRING_DB_URL }}
          SPRING_DB_USERNAME: ${{ secrets.SPRING_DB_USERNAME }}
          SPRING_DB_PASSWORD: ${{ secrets.SPRING_DB_PASSWORD }}
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}
          BACKEND_HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
          BACKEND_APP_DIR: ${{ secrets.BACKEND_APP_DIR }}
        with:
          host: ${{ secrets.BACKEND_SERVER_HOST }}
          username: ${{ secrets.BACKEND_SERVER_USER }}
          key: ${{ secrets.BACKEND_SERVER_SSH_KEY }}
          envs: DB_PASSWORD,JWT_SECRET,AI_API_URL,SPRING_DB_URL,SPRING_DB_USERNAME,SPRING_DB_PASSWORD,SPRING_DATASOURCE_URL,SPRING_DATASOURCE_USERNAME,SPRING_DATASOURCE_PASSWORD,REDIS_URL,RABBITMQ_URL,BACKEND_HEALTH_URL,BACKEND_APP_DIR
          script: |
            set -euo pipefail

            APP_DIR="${BACKEND_APP_DIR}"
            JAR_PATH="${APP_DIR}/app.jar"
            ENV_PATH="/etc/withbuddy-backend.env"
            TMP_ENV_PATH="${APP_DIR}/backend.env.tmp"
            SERVICE_NAME="withbuddy-backend.service"
            HEALTH_URL="${BACKEND_HEALTH_URL:-http://127.0.0.1:8080/actuator/health}"

            mkdir -p "${APP_DIR}"
            test -f "${JAR_PATH}"

            EFFECTIVE_DB_URL="${SPRING_DB_URL:-${SPRING_DATASOURCE_URL:-}}"
            EFFECTIVE_DB_USERNAME="${SPRING_DB_USERNAME:-${SPRING_DATASOURCE_USERNAME:-}}"
            EFFECTIVE_DB_PASSWORD="${SPRING_DB_PASSWORD:-${SPRING_DATASOURCE_PASSWORD:-${DB_PASSWORD:-}}}"

            if [ -z "${EFFECTIVE_DB_URL// }" ]; then
              echo "ERROR: DB URL is empty. Check SPRING_DB_URL or SPRING_DATASOURCE_URL secret."
              exit 1
            fi
            if [ -z "${EFFECTIVE_DB_USERNAME// }" ]; then
              echo "ERROR: DB username is empty. Check SPRING_DB_USERNAME or SPRING_DATASOURCE_USERNAME secret."
              exit 1
            fi
            if [ -z "${EFFECTIVE_DB_PASSWORD// }" ]; then
              echo "ERROR: DB password is empty. Check SPRING_DB_PASSWORD or SPRING_DATASOURCE_PASSWORD/DB_PASSWORD secret."
              exit 1
            fi

            cat > "${TMP_ENV_PATH}" <<EOF
            DB_PASSWORD=${DB_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            AI_API_URL=${AI_API_URL}
            SPRING_DB_URL=${EFFECTIVE_DB_URL}
            SPRING_DB_USERNAME=${EFFECTIVE_DB_USERNAME}
            SPRING_DB_PASSWORD=${EFFECTIVE_DB_PASSWORD}
            SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
            SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
            SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
            REDIS_URL=${REDIS_URL}
            RABBITMQ_URL=${RABBITMQ_URL}
            SPRING_PROFILES_ACTIVE=prod
            EOF
            chmod 600 "${TMP_ENV_PATH}"
            sudo install -m 600 "${TMP_ENV_PATH}" "${ENV_PATH}"
            rm -f "${TMP_ENV_PATH}"

            sudo systemctl restart "${SERVICE_NAME}"
            sudo systemctl is-active --quiet "${SERVICE_NAME}"

            for i in {1..12}; do
              if curl -fsS "${HEALTH_URL}"; then
                echo "Health check succeeded on attempt ${i}"
                exit 0
              fi
              echo "Health check failed on attempt ${i}, retrying in 5s..."
              sleep 5
            done

            echo "Health check failed after retries. Collecting diagnostics..."
            sudo systemctl status "${SERVICE_NAME}" --no-pager -l || true
            sudo journalctl -u "${SERVICE_NAME}" -n 200 --no-pager || true
            exit 1
