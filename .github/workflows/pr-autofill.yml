name: Autofill PR Body

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  autofill:
    runs-on: ubuntu-latest
    steps:
      - name: Generate PR body from commit messages
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const currentBody = pr.body || "";

            // Keep manual edits when lock marker is present.
            if (currentBody.includes("<!-- AUTO_FILL_LOCK -->")) {
              core.info("AUTO_FILL_LOCK marker found. Skip PR body autofill.");
              return;
            }

            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              { owner, repo, pull_number: pr.number, per_page: 100 }
            );

            const titles = commits
              .map((c) => (c.commit.message || "").split("\n")[0].trim())
              .filter(Boolean);

            const uniqueTitles = [...new Set(titles)];
            const topSummary = uniqueTitles.slice(0, 2);

            const issueRefs = [...new Set(
              titles.flatMap((msg) => {
                const matches = msg.match(/#\d+/g);
                return matches || [];
              })
            )];

            const summaryLines = topSummary.length
              ? topSummary.map((s) => `- ${s}`).join("\n")
              : "- 변경 사항 요약을 입력해주세요.";

            const changeLines = uniqueTitles.length
              ? uniqueTitles.map((s) => `- ${s}`).join("\n")
              : "- 변경된 동작/기능을 항목별로 적어주세요.";

            const issueLines = issueRefs.length
              ? issueRefs.map((n) => `- Closes ${n}`).join("\n")
              : "- Closes #이슈번호";

            const body = [
              "## 요약",
              summaryLines,
              "",
              "## 문서 버전 (문서 변경 시)",
              "- 업데이트된 문서 버전을 적어주세요.",
              "- 예시: `1.2.0`",
              "",
              "## 변경 사항",
              changeLines,
              "",
              "## 스크린샷/영상 (UI 변경 시)",
              "- 전/후 비교가 가능하도록 첨부해주세요.",
              "",
              "## 관련 이슈",
              issueLines,
              "",
              "## 체크리스트",
              "- [ ] 변경 의도와 범위를 이해할 수 있게 작성했다",
              "- [ ] 로컬 테스트를 수행했다 (또는 테스트 불가 사유를 기록했다)",
              "- [ ] 문서/가이드 업데이트가 필요한 경우 반영했다",
              "",
              "## 💬 리뷰어에게",
              "<!-- 특별히 확인해주었으면 하는 부분 -->"
            ].join("\\n");

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pr.number,
              body
            });
