name: Autofill PR Body

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  autofill:
    runs-on: ubuntu-latest
    steps:
      - name: Generate PR body from commit messages
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const currentBody = pr.body || "";
            const templateMarker = "<!-- AUTO_FILL_TEMPLATE -->";

            // Keep manual edits when lock marker is present.
            if (currentBody.includes("<!-- AUTO_FILL_LOCK -->")) {
              core.info("AUTO_FILL_LOCK marker found. Skip PR body autofill.");
              return;
            }

            // Keep user-entered body as-is.
            // Autofill runs when body is empty or template-only body.
            const hasContent = (currentBody || "").trim().length > 0;
            const isTemplateBody = currentBody.includes(templateMarker);
            if (hasContent && !isTemplateBody) {
              core.info("PR body already has content. Skip autofill.");
              return;
            }

            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              { owner, repo, pull_number: pr.number, per_page: 100 }
            );

            const titles = commits
              .map((c) => (c.commit.message || "").split("\n")[0].trim())
              .filter(Boolean);

            const cleanedTitles = titles
              .filter((title) => !/^merge\b/i.test(title))
              .filter((title) => !/^chore:\s*sync\b/i.test(title));

            const uniqueTitles = [...new Set(cleanedTitles)];
            const topSummary = uniqueTitles.slice(0, 2);

            const issueRefs = [...new Set(
              cleanedTitles.flatMap((msg) => {
                const matches = msg.match(/#\d+/g);
                return matches || [];
              })
            )].sort((a, b) => Number(a.slice(1)) - Number(b.slice(1)));

            const sections = [];
            const addSection = (title, lines) => {
              const normalized = (lines || [])
                .map((line) => `${line}`.trim())
                .filter(Boolean);
              if (!normalized.length) return;
              sections.push(`## ${title}`);
              sections.push(...normalized);
              sections.push("");
            };

            addSection("요약", topSummary.map((s) => `- ${s}`));
            addSection("변경 사항", uniqueTitles.map((s) => `- ${s}`));
            addSection("관련 이슈", issueRefs.map((n) => `- Closes ${n}`));
            addSection("체크리스트", [
              "- [ ] 변경 의도와 범위를 이해할 수 있게 작성했다",
              "- [ ] 로컬 테스트를 수행했다 (또는 테스트 불가 사유를 기록했다)",
              "- [ ] 문서/가이드 업데이트가 필요한 경우 반영했다"
            ]);

            const body = sections.join("\n").trim();

            if (!body) {
              core.info("No meaningful content to autofill. Skip update.");
              return;
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pr.number,
              body
            });
