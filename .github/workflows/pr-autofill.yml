name: Autofill PR Body

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  autofill:
    runs-on: ubuntu-latest
    steps:
      - name: Generate PR body from commit messages
        id: autofill_body
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const currentBody = pr.body || "";
            const templateMarker = "<!-- AUTO_FILL_TEMPLATE -->";
            const autoStart = "<!-- AUTO_FILL_COMMITS_START -->";
            const autoEnd = "<!-- AUTO_FILL_COMMITS_END -->";

            // Keep manual edits when lock marker is present.
            if (currentBody.includes("<!-- AUTO_FILL_LOCK -->")) {
              core.info("AUTO_FILL_LOCK marker found. Skip PR body autofill.");
              return currentBody.trim();
            }

            // Skip only when user fully replaced template/auto block with custom body.
            const hasContent = currentBody.trim().length > 0;
            const isTemplateBody = currentBody.includes(templateMarker);
            const hasAutoBlock = currentBody.includes(autoStart) && currentBody.includes(autoEnd);
            if (hasContent && !isTemplateBody && !hasAutoBlock) {
              core.info("Custom PR body detected (no template/auto markers). Skip autofill.");
              return currentBody.trim();
            }

            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              { owner, repo, pull_number: pr.number, per_page: 100 }
            );

            const titles = commits
              .map((c) => (c.commit.message || "").split("\n")[0].trim())
              .filter(Boolean);

            const cleanedTitles = titles
              .filter((title) => !/^merge\b/i.test(title))
              .filter((title) => !/^chore:\s*sync\b/i.test(title));

            const uniqueTitles = [...new Set(cleanedTitles)];
            const commitLines = uniqueTitles.map((title) => `- ${title}`);
            if (commitLines.length === 0) {
              commitLines.push("- (커밋 메시지 없음)");
            }

            const generatedBlock = [
              autoStart,
              "## 변경 사항",
              ...commitLines,
              autoEnd
            ].join("\n");

            // 1) 기존 자동 블록이 있으면 해당 블록만 교체해서 수동 섹션을 보존
            let body = currentBody;
            if (hasAutoBlock) {
              const escapedStart = autoStart.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
              const escapedEnd = autoEnd.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
              const autoBlockRegex = new RegExp(`${escapedStart}[\\s\\S]*?${escapedEnd}`);
              body = currentBody.replace(autoBlockRegex, generatedBlock);
            } else if (isTemplateBody) {
              // 2) 기본 템플릿 상태(선택 섹션 미입력)라면 선택 섹션은 제거하고 자동 블록만 유지
              body = generatedBlock;
            } else {
              // 3) 빈 바디인 경우 자동 블록만 생성
              body = generatedBlock;
            }

            body = body.trim();
            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pr.number,
              body
            });

            return body;

